/* ================================================================
   gopher-ai-engine.js — Gopher AI Pill engine
   ----------------------------------------------------------------
   Pair with gopher-ai-engine.css. Link both into any page that has
   the .ai-bar markup; on DOM-ready, the boot adapter finds the pill,
   adds the missing hooks, and the engine attaches.

   THINGS TO WIRE BEFORE LAUNCH (search this file for "TODO"):
     - window.bookService     — route to your real request flow
     - window.contactSupport  — route to your real support page
     - analyzeUpload(file)    — the "+" upload analyzer is a STUB;
                                replace with your vision/DB backend.
   ================================================================ */

(function() {
  function showDiagnosticError(stage, err) {
    try {
      var box = document.createElement('div');
      box.style.cssText = "position:relative;margin:14px auto;max-width:640px;padding:16px 18px;background:#fff;border:2px solid #c33;border-radius:14px;font-family:system-ui,sans-serif;font-size:13px;line-height:1.55;color:#222;z-index:99;box-shadow:0 8px 22px rgba(0,0,0,0.18);";
      box.innerHTML =
        '<div style="font-weight:800;color:#c33;font-size:14px;margin-bottom:6px;">Gopher iQ engine error during: <code style=\"background:#fee;padding:2px 6px;border-radius:4px;\">' + stage + '</code></div>' +
        '<div style="margin-bottom:6px;"><strong>Message:</strong> ' + (err && err.message ? err.message : String(err)) + '</div>' +
        '<div style="font-size:11px;color:#666;white-space:pre-wrap;max-height:140px;overflow:auto;background:#fafafa;padding:8px;border-radius:6px;border:1px solid #eee;">' + (err && err.stack ? err.stack.split('\n').slice(0,6).join('\n') : '(no stack trace available)') + '</div>';
      var bar = document.querySelector('.ai-bar');
      if (bar && bar.parentNode) {
        bar.parentNode.insertBefore(box, bar.nextSibling);
      } else {
        document.body.appendChild(box);
      }
    } catch(e2) {
      console.error('Gopher iQ: failed to show diagnostic', e2);
    }
  }
  function _safeStage(name, fn) {
    try { fn(); }
    catch(e) {
      console.error('[Gopher iQ] error in ' + name + ':', e);
      showDiagnosticError(name, e);
      throw e;
    }
  }
  function start(){
    try {
(function(){
  // ---- boot adapter: attach to the existing .ai-bar without changing its looks ----

(function bootGopherAI(){
  // Find the existing AI pill on the page. The host page already styles .ai-bar
  // (the white rounded pill, plus/scope/mic). We just need to attach hooks.
  var bar=document.querySelector('.ai-bar');
  if(!bar){ console.warn('[Gopher AI] No .ai-bar element found on page; engine not booted.'); return; }
  // Ensure the bar has the id the engine expects (idempotent).
  if(!bar.id) bar.id='aiBar';
  // Wrap the bar in .ai-wrap (relative positioning anchor for the results dropdown),
  // unless it is already inside one.
  var wrap=bar.closest('.ai-wrap');
  if(!wrap){
    wrap=document.createElement('div');
    wrap.className='ai-wrap';
    bar.parentNode.insertBefore(wrap,bar);
    wrap.appendChild(bar);
  }
  // Find the input inside the existing pill and give it id="aiInput".
  var input=bar.querySelector('input[type="text"],input:not([type])');
  if(input && !input.id) input.id='aiInput';
  // Find the existing scope (the "General v" element). Re-wrap it so the engine's
  // dropdown menu can anchor to it. The visible look is preserved.
  var scope=bar.querySelector('.ai-scope');
  if(scope){
    // If the scope is just a <span>, replace with a <button> the engine expects.
    if(scope.tagName!=='BUTTON'){
      var btn=document.createElement('button');
      btn.type='button';
      btn.className=scope.className;
      btn.innerHTML=scope.innerHTML;
      scope.parentNode.replaceChild(btn,scope);
      scope=btn;
    }
    scope.id='aiScope';
    scope.setAttribute('aria-haspopup','true');
    scope.setAttribute('aria-expanded','false');
    // Wrap scope in .ai-scope-wrap for menu positioning + add inner label span.
    if(!scope.parentNode.classList.contains('ai-scope-wrap')){
      var sw=document.createElement('div');
      sw.className='ai-scope-wrap';
      scope.parentNode.insertBefore(sw,scope);
      sw.appendChild(scope);
      // The existing scope shows "General" + chevron. Wrap the "General" text node
      // in a span#aiScopeLabel so the engine can update it.
      // We replace innerHTML with: <span id="aiScopeLabel">General</span> + chev svg.
      // Pull the existing chevron SVG to preserve it; create new label span.
      var chev=scope.querySelector('svg');
      var label=document.createElement('span'); label.id='aiScopeLabel';
      label.textContent=(scope.textContent||'General').trim().replace(/\s+/g,' ').split(' ')[0] || 'General';
      scope.innerHTML='';
      scope.appendChild(label);
      if(chev){ chev.classList.add('chev'); scope.appendChild(chev); }
      // Add the scope-menu container (engine populates it).
      var menu=document.createElement('div');
      menu.className='scope-menu'; menu.id='scopeMenu'; menu.setAttribute('role','menu');
      sw.appendChild(menu);
    }
  }
  // Add the results dropdown right after the bar (engine fills it on every search).
  if(!document.getElementById('aiResults')){
    var res=document.createElement('div');
    res.className='ai-results'; res.id='aiResults';
    wrap.appendChild(res);
  }
  // Add the expanded answer panel (engine opens it when a result is clicked).
  if(!document.getElementById('answerPanel')){
    var panel=document.createElement('div');
    panel.className='answer-panel'; panel.id='answerPanel';
    // Place it just after the wrap so it appears below the pill.
    wrap.parentNode.insertBefore(panel,wrap.nextSibling);
  }
  // ---- UPLOAD WIRING ----
  // Make the existing "+" icon a real file picker entry point. The icon itself
  // is NOT restyled or moved; we only attach behavior. A hidden <input type="file">
  // sits inside the bar and is triggered by clicking the +.
  var plus = bar.querySelector('.ai-plus');
  if(plus && !document.getElementById('aiUpload')){
    plus.style.cursor='pointer';
    plus.setAttribute('role','button');
    plus.setAttribute('aria-label','Upload a photo or document for help identifying a service');
    plus.setAttribute('title','Upload a photo or document — we can help identify what you need');
    var fileIn=document.createElement('input');
    fileIn.type='file';
    fileIn.id='aiUpload';
    // Photos + PDFs + any document type — wide-open per product spec.
    fileIn.accept='image/*,application/pdf,.doc,.docx,.txt,.rtf,.odt,.heic,.heif,*';
    fileIn.style.display='none';
    bar.appendChild(fileIn);
    plus.addEventListener('click', function(e){
      e.preventDefault(); e.stopPropagation();
      fileIn.value=''; fileIn.click();
    });
    fileIn.addEventListener('change', function(){
      var f=fileIn.files && fileIn.files[0];
      if(f && typeof window.handleUpload==='function') window.handleUpload(f);
    });
  }
})();

  // ---- engine ----

/* ================================================================
   THE DATA — all 58 real FAQs pulled straight from gopher-faqs.html
   Later: replace FAQS with a fetch() to your database/API.
   ================================================================ */
const FAQS = [{"group": "Customers", "q": "What are your hours?", "a": "Gopher Requests are available 24/7/365. If there's a Gopher requested and a Gopher available, we go to work!", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "How much does it cost to use the Gopher app?", "a": "Gopher charges the following fees to make a request: Gopher Fees: This ranges from $0.99 to $4.99, depending on the type of service requested. Instant Transfer Fee: 8% of the total request amount. This covers the operating cost to ensure the Gopher is paid immediately upon completing your request. Age-Restricted Fee (if applicable): $1.99 covers the cost of the age-restricted safeguarding in place. Gopher TrustShield Discount (for age-restricted deliveries): $1.00 is deducted from all age-restricted requests if you add the free Gopher TrustShield. For example, a “Delivery – General Errand” where you want to pay a Gopher $30 total would cost $33.47 (Cost of Goods = $20, Gopher Offer = $10, Gopher Fee = $0.99, Instant Transfer Fee = $2.48). The Gopher receives all $30 of your offer, costing you only $3.47 to use the app.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "What if I don't know the Cost of Goods available for my order?", "a": "Knowing the cost of the items you want, availability, and store hours is important because once the Gopher accepts the request, they're doing so in good faith that everything requested is available and priced accordingly. This lets you order what you need without costly markups. If the cost of goods submitted is a little off, your Gopher can submit a COST ADJUSTMENT for the correct amount. We just ask you to be as close as possible.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "Where is my order?", "a": "There are usually only a couple reasons a request isn't accepted: We may not have enough Gophers in your area yet. Anytime a request is submitted in a new area, we get to work recruiting available Gophers there. The offer may have been deemed too low for the Gophers in your area. Gopher is NOT an auto-fulfillment service — the offer you make is 100% of what your worker earns. They work for you, not Gopher, Inc. If your offer is below the typical accepted offer, you'll see a pop-up sharing the average offer for that category. You can still offer whatever amount you want.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "What info should I put in my request?", "a": "Your request should be as descriptive as possible — the more info the better. No one knows what you want done better than you, so take your time describing EXACTLY what you want so there's no confusion. Example of what not to do: “Need mulch spread in my backyard.” Example of what to do: “I need 12 yards of mulch laid in my backyard. Must have own equipment” (while supplying any relevant pictures). We strongly recommend NOT putting your phone number in the request. We've provided the ability to communicate before and during your request through the app.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "How is Gopher different than other Home Services providers?", "a": "Most people have been conditioned to Google the service they need (or ask for recommendations on social media). Either way, it's you that ends up searching for all the help. On the Gopher Marketplace, you list the service you need, for the price you're willing to pay (or you can ask for a bid), and the help comes to you. You can then see each worker's ratings, reviews, work history, and recommendations to make your selection. Home Service providers on the Gopher Go app find it refreshing that they don't have to pay for leads to see jobs, they know exactly how much they're being paid before starting, and are paid immediately once the job is complete.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "I meant to sign up for Gopher Go but signed up for Gopher Request (or vice-versa). How do I change that?", "a": "If you inadvertently signed up for the opposite Gopher app, don't sweat it. Your Gopher profile applies to both apps. Just download the correct app, sign in with your phone number, apply the OTP, and you're all set! At the bottom of the app's home page, you'll see a Refer App icon. Opening the link shows your referral code. When you refer friends via Message or Email, you'll see a “check referral status” showing all pending SMS and Emails sent, as well as those who signed up from your link.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "How do I report an app issue?", "a": "In the “More” section of the app (bottom-right icon on the floorboard), you'll see the Help Center link. From there you'll see “Send us a message.”", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "Can I request age-restricted products?", "a": "Yes. During the request submission process, you must agree to our age-restricted waiver, stating you understand you must show a valid ID before receiving any age-restricted items, and acknowledge that if an order is placed without being able to provide a valid ID at delivery, there will not be a refund for the cost of the items nor the Gopher offer. Our unwavering compliance ensures minors or any ineligible parties cannot use the Gopher app for age-restricted delivery and/or purchase.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "Is there a minimum order needed to make a request?", "a": "No, you can make any offer amount for any request you choose. However, if you're new to Gopher, please look at your offer as a wage and not a “tip.” The Gophers you hire work for you, not Gopher, Inc. For example, for a unique delivery that takes 1/2 hour to an hour, think about what it would take for you to do that job. When the offer is fair, you'll get what you need FAST! If no one accepts your request, it will expire and there will not be a charge — not even a pre-authorization.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "What should I do when my request is accepted?", "a": "Your Gopher is encouraged to start correspondence with you immediately after accepting. If you chose FIRST AVAILABLE and/or NOTIFY A FAVORITE GOPHER, no action is needed on your part. You'll see where your Gopher is located from start to finish and receive alerts at each stage. If you chose SELECT MY GOPHER, you'll be able to review each interested Gopher's ratings, reviews, and work history before making your selection.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "How can I see my previous orders?", "a": "On the app's dashboard, select “Account” then “Request History.” You'll see all previously completed, expired, and/or cancelled requests. From there you can select REQUEST AGAIN (making any changes you want).", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "Am I able to see when my Gopher will arrive?", "a": "Yes. For requests involving a pick-up and drop-off, once your Gopher selects “in-progress,” your request screen shows a map of the Gopher's location relative to the destination(s). If you ever see the driver “stuck,” check in via text or call — some areas have poor connection, but calls and texts typically get through better than location services.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "What criteria do I use to rate my Gopher?", "a": "Please rate your Gopher on accuracy, communication (keeping you informed of your request's status), quality of work, and timeliness. This impacts the order they see future jobs, so if your worker met your expectations, please rate them a 5 😉", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "What address do I enter if my request has multiple addresses?", "a": "Enter the final destination address when entering the address of a “multiple-stop” request, then enter the other address(es) in the description section. We recommend entering the address of a store vs. just the name, in case there's more than one location.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "What type of purchase protection do I have when making a request?", "a": "When you submit your request and it's accepted, Gopher, Inc. transfers the money from your selected payment method to a holding account to ensure the entire request amount is available once completed. If the request is not completed, the money authorized is released back to the card on file. Please see our Terms and Conditions for related scenarios regarding payments, refunds, or disputes. We chose Stripe as our trusted payment transaction partner to keep all transactions efficient, safe, and secure.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "Can I cancel my request after the worker has started?", "a": "If your request is accepted and the Gopher has updated it to “in-progress,” you may be charged up to $5 for cancelling. If the Gopher has updated it to “items purchased” (an out-of-pocket expense), you may also be responsible for the items purchased amount. Please see our Terms and Conditions for complete details. You and your worker can agree on whatever you want regarding cancelling — we just make sure workers are never put in a position to lose money when accepting a job in good faith.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "What if my Gopher delivered the wrong item(s)?", "a": "Fortunately this is rare (especially when they pay for items out of pocket). If your Gopher brings the wrong item(s) and your description (including pic) was clear, you can Dispute your request with comments in the app. This immediately alerts your Gopher to resolve the issue — typically by returning to the store to exchange, or cancelling (resulting in no charge to you). Please allow the Gopher to make it right, especially if they've made an out-of-pocket expense. DO NOT select “unable to resolve” without allowing them to correct it AND communicating what needs to be done in the message section. If you ever need help, contact support@gophergo.io .", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "What's the difference between \"You Make the Offer\" and \"Allow a Gopher to Make the Offer\"?", "a": "You can set the price for a service ( You make the price offer ), or if unsure what's fair, broadcast your request for Gophers to bid on ( Allow a Gopher to make the offer ). If you let a Gopher make the offer, you can accept or decline offers as they come in.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "How do I use the Favorite Gopher option?", "a": "You can add to your Favorite Gophers list two ways: Go to Account → Request History — a checkbox to add the Gopher who completed your request is available. At the end of a completed request, during the ratings portion, you can add that Gopher as a Favorite. Once you have at least 1 Favorite Gopher, when submitting a request you'll see a “Notify one of my Favorite Gophers” option added to “First Available” and “Select My Gopher.” This ensures your Favorite is notified before anyone else. If unavailable, it defaults to “Select My Gopher.”", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "Can I use contactless delivery for age-restricted items?", "a": "No. Negative. Never! During submission, you must agree to our Age-Restricted waiver, acknowledging you must show a valid ID before receiving any age-restricted items. If an order is placed without a valid ID at delivery, there will not be a refund for the items nor the Gopher offer. We're unwavering here to follow the letter and spirit of the law, ensuring minors or any ineligible party cannot use the app for age-restricted delivery and/or purchase.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "I have the latest version of the app but it isn't performing well.", "a": "In some cases, especially with iOS, previous version bugs stick around. A known remedy is to delete the app from your phone and reinstall (do NOT delete your Gopher account — just the app). This removes all previous version data. Reinstalling from the App or Play Store usually solves it. If it doesn't, email support@gophergo.io or use the Help Center in your app.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "Why can't I change my name for TrustShield?", "a": "If you set up your Gopher Request account with an alias, you won't be able to apply for Gopher TrustShield. If you've been using Gopher Request and want to keep your request history, email a clear picture of the front and back of your ID to support@gophergo.io . If you have no activity on your account, delete it and sign up again. Before saving your profile, you'll have an opportunity to check that your information is entered correctly.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "What if my Gopher is asking me to pay additional money outside the app?", "a": "Never do this! Gopher can only fulfill transactions made using the platform. If a Gopher states they need additional money outside the app, that's a violation of our terms and conditions — contact us immediately. Before a request is accepted, if items require a purchase, the Gopher must confirm they have the funds needed, and if not, should NOT accept the request.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "What if the app says \"Your app is offline\" at the top of the screen?", "a": "This represents a poor Wi-Fi and/or data connection. Often you'll still be able to make your request — our app is just letting you know the signal is very weak.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "Why was I charged for not providing my ID during an age-restricted delivery?", "a": "When submitting an age-restricted request, you receive multiple pop-up confirmations regarding the mandatory requirement to show a valid government-issued ID during delivery. With every age-restricted delivery, you must be present with your ID at the exchange OR the Gopher is entitled to the entire amount offered. This is not negotiable nor refundable, so if you don't have your ID, please DO NOT make a request for age-restricted product delivery.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "What information should I provide to potential workers messaging me during a newly submitted request?", "a": "Common sense is king. If a potential worker asks the dimensions of a couch (especially if that info was left out), by all means answer. If they're asking for your phone, address, or other info they shouldn't need, flag the message and contact Gopher Support. You're never obligated to respond, but if it's a relevant question, we encourage you to answer. Once connected to your Gopher, you can communicate via text or call without restrictions.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "Why can't I upload a pic, OR I added a pic and can't continue?", "a": "That's 1 of 2 issues: A photo permissions issue from your phone. Go to your phone settings, select the Gopher app, and make sure camera/photos settings are set to allow. You're trying to submit a photo that's in “live mode” (the equivalent of a video). Turn live mode off and submit as a regular photo and it will work.", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "Why can't I enter my address?", "a": "That sounds like a location permissions issue from your phone. Go to your phone settings, select the Gopher app, and make sure location settings are set to allow .", "kw": "", "audience": "any", "topic": ""}, {"group": "Customers", "q": "How long does a delivery take?", "a": "That depends on where the driver is relative to the pick-up and drop-off. As a best practice, we onboard drivers with the expectation that deliveries should be completed in less than an hour. Even with “First Available” and “Need it Now,” if a driver accepts your request outside 15 miles, you have to approve that worker to help meet that expectation. If you need something much faster, say that in your description.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "What are your hours?", "a": "Gopher Requests are available 24/7/365. If there's a Gopher requested and a Gopher available, we go to work!", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "Why is there a Cost of Goods amount?", "a": "Anytime there's a “Cost of Goods” amount listed, the Requestor is paying you that amount to pay on their behalf. For example, for a meal from a Food Truck with no advance payment option, they'll enter the amount in Cost of Goods for you to pay on their behalf. You pay for the items initially (the money is already in escrow and GUARANTEED to you immediately upon completion). This keeps costs down for everyone — Merchants, Requesters, and Gophers all benefit. If you aren't interested in these transactions or don't have the funds to cover the Cost of Goods, please DO NOT accept the request.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "When do I receive my payout?", "a": "When a Gopher signs up, they receive their first 10 payouts at Stripe's “Standard” US payout speed (typically 2 hours from the time the customer confirms). After 10 successfully completed requests, the Gopher is upgraded to “Instant Payout” — payouts deposited immediately after completion (1–2 minutes). Gopher Pros start with Instant Payout. Payouts are initiated when a Gopher updates the request status to “Complete.” This triggers an SMS and app notification to the Requestor, who selects “Confirmed” or “Dispute.” When “Confirmed” is selected, the payout process starts and deposits go directly to the Debit Card on file. If the Requestor forgets to confirm, payout automatically occurs after 48 hours. As a best practice, remind the requestor in person to select confirmed right then to avoid delays. In your app, tapping Account → Request History → Completed → View Request Logs shows the status of a payout, including Order Completed, Requester Confirmed, and Payout Completed timestamps. Payouts can be delayed by: an expired, unsupported, compromised, bank-blocked, and/or cancelled card. Updating to a valid card resumes pending payouts, but causes a delay that can't be sped up — so ensure your card is in good standing before completing a request.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "What does \"Make Me An Offer\" mean?", "a": "This feature is for when a Requestor doesn't know what a fair offer would be. A Gopher sees exactly what's needed, and where the price is normally listed it says Make Me An Offer . If interested, they accept the request and enter their cost for materials (if applicable) and how much they want to charge for the service. The bid is sent to the Requestor, who can accept or decline.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "I meant to sign up for Gopher Request but signed up for Gopher Go (or vice-versa). How do I change that?", "a": "If you inadvertently signed up for the opposite app, don't sweat it. Your Gopher profile applies to both apps. Just download the correct app, sign in with your phone number, apply the OTP, and you're all set! At the bottom of the app's home page, you'll see a Refer App icon showing your referral code. When you refer friends via Message or Email, you'll see a “check referral status” for all pending SMS/Emails sent and signups from your link.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "How do I report an app issue?", "a": "In the “More” section of the app (bottom-right icon on the floorboard), you'll see the Help Center link. From there you'll see “Send us a message.”", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "How can I set up my payout account if I don't have an ID?", "a": "Unfortunately there's no way around needing verification. However, Stripe offers several options: Passport, Passport Card, Driver's License, State-Issued ID Card, Resident Permit ID / US Green Card, Border Crossing Card, Child ID Card, NYC Card, US Visa Card, and Birth Certificate.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "Why can I not upload a pic?", "a": "That's 1 of 2 issues: A photo permissions issue from your phone. Go to your phone settings, select the Gopher Go app, and make sure camera/photos settings are set to allow. The photo is in “live” mode (the equivalent of a video). Turn live mode off and submit as a regular photo and it will be accepted.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "If I accept a request, can I cancel it?", "a": "If a Gopher accepts a request, they're expected to complete it. Cancelling before completing incurs up to a $5 fee. Please see our Terms and Conditions for details. Note that accepting a request authorizes a customer's card — cancelling causes a major inconvenience to the customer. This is the single most common reason a Gopher is removed from the platform. We want to be fair: we understand emergencies and car trouble happen. But when they repeatedly happen, the customer experience is compromised and we have to ensure it doesn't happen again.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "If I counter a request, am I obligated to take it?", "a": "Yes. The counter-offer feature is just like accepting a request (and arguably even more important to complete). If you submit a counter-offer, you're accepting the request for the amount you think is fair and are willing to work for. If the Requestor accepts your counter-offer, you're obligated to complete it.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "How can I get more information regarding a pending request?", "a": "Gophers can communicate with Requestors through the in-app messaging link. When you open a request from the available queue, you'll see a “Question?” button. This is exclusively for getting more information about a request — not to ask for more money (that's a Counter-Offer) or to exchange numbers/emails to circumvent the app.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "What if 2+ Gophers are requested?", "a": "When a request calls for 2 or more Gophers, the Gopher who accepts receives the entire pay for the job once completed. It's the responsibility of the accepting Gopher to ensure they have the additional help. The total amount shown is NOT multiplied by the number of Gophers — the total amount IS the total. If it's not enough to cover the crew needed, submit a counter-offer or don't accept. It's very important not to accept a 2+ job if you cannot find the additional help first. Accepting then cancelling may cause removal from the platform.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "Why do I have to pay for the items requested?", "a": "Requests where a purchase is needed require an initial out-of-pocket expense. This amount, along with the offer, is paid out immediately after completion. You're never required to accept a “purchase needed” request and can always ignore them. Because the Gopher marketplace doesn't have structured partnerships with vendors/merchants, users avoid extreme mark-ups. Age-restricted items cannot be delivered by a Gopher under 21 or received by a user under 21, and must be proven with legal government-issued ID. Please DO NOT accept a “purchase needed” request unless you have the funds available — this would be an unexcused cancellation, a major inconvenience, and subject to a fee and/or removal.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "Do I need to keep a receipt of items purchased?", "a": "Yes, it's always in your best interest to save receipts of items purchased for up to 60 days. Although disputes are very rare, you may need to provide a receipt if a dispute is filed regarding a request you performed.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "What if a request asks for age-restricted items to be dropped off without contact?", "a": "Albeit rare, sometimes a user writes in special instructions to drop off age-restricted items without contact. This CANNOT be honored, EVER. It's every Gopher's responsibility to physically check for a valid ID before delivery of age-restricted products is completed (and capture a pic). Never feel bad for asking — there are no other legal options on any platform. You can always message the requestor before accepting to ensure they understand.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "I completed the order, so why hasn't the Requestor confirmed yet?", "a": "Although rare, sometimes the requestor doesn't have access to their device at the time of completion. Once you select complete, we send the Requester a text and app alert and continue reminders until it's confirmed OR 48 hours pass (after which payout is automatically initiated). As a best practice, when with the requestor for a completed job, let them know they'll receive a confirmation alert and to please confirm it — that's what initiates your payout.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "What if the Requester cannot provide a valid ID at the delivery destination?", "a": "When the Requester submits an age-restricted request, they receive multiple pop-up confirmations regarding the mandatory requirement to show a valid government-issued ID. They must be present with their ID at the exchange OR the Gopher is entitled to the entire amount offered. If they don't have their ID present, you can select “ID not present” and complete the transaction with applicable notes. You'll see a timer on your completed screen and must allow 10 minutes before selecting “Identity not confirmed and completed.” If this occurs, you'll still be paid for the entire request.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "Why is my payout delayed?", "a": "With Stripe's exceptional payout track record, a delay is easy to identify. Any time there's a delay or error: Check the card used to ensure it's still valid (confirm with your bank it isn't blocked, compromised, and/or expired). Add a new valid payout card to your Payout Account and set it as the default payout method. Delete the old card (do this AFTER the new card is entered to save your Stripe payout history). Once a valid card is established, Stripe confirms it the next business day, then existing payout amounts transfer to the newly confirmed card (also ~1 business day). Avoid this reconciliation if possible — there's no way to speed it up once the initial attempt fails, and contacting Gopher won't speed it up. This is easily avoided by keeping a valid card on file before completing a request. Rest assured, once you complete a request the money is always accounted for.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "I accepted a request and it disappeared?", "a": "This could be a few different scenarios: Accepting triggers the customer's card authorization. If the card declines, the request “disappears” so other Gophers don't see it as available. We immediately send the cardholder info on why it declined and how to correct it. If fixed within 5 minutes, you'll get the first opportunity to reengage (make sure notifications are set to “Allow”). If 2+ Gophers attempt to accept at the same time, the first is awarded the request and it disappears from others' queues. If the customer used “Select My Gopher,” it must be approved on their end before you're connected. In an area with poor reception, simply changing your screen or closing/reopening refreshes the app.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "What if a request is clearly for age-restricted items, but the 21+ icon is not shown?", "a": "This represents the user either inadvertently selecting the incorrect category, or trying to circumvent an age-restricted category to avoid the mandatory safeguards. If you see this, flag the request immediately. As a courtesy, you can message them to “edit” their request and select “this request contains age-restricted items.”", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "Why is my debit card not accepted?", "a": "Gopher is an instant payout platform and partners with Stripe for payouts. Instant payouts are Debit Cards only. Stripe accepts virtually all US bank debit cards. Because Stripe is a third-party integration, they might not be able to verify your card immediately — please check Stripe's supported banks list to ensure your card is accepted.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "Can I increase the cost of items during a counter-offer?", "a": "The short answer is yes — but ONLY if you're 100% certain the amount listed is significantly off. The cost of items isn't meant to make or lose money; it's for customers to purchase items at retail prices. Because there's a counter-offer cap, using cost of items to circumvent the offer cap is a violation of our terms and subject to immediate account deactivation.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "Why is there a cap on the counter-offer feature?", "a": "The Gopher Marketplace is intended to be a fair platform. The cap was created using information from tens of thousands of requests. While a request may rarely be egregiously low, you can always message the customer and respectfully explain you'd do their request for a higher amount if they're willing to edit and resubmit. We implemented the cap because first-time users would make a reasonable offer (e.g. $12.50 for a simple delivery) and a Gopher would counter for $50 — from the customer's perspective that's ridiculously high, so they'd cancel and even delete their account. We had to take that off the table.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "Do I have to pay to become a Gopher?", "a": "To find work as a standard Gopher, NO — the app is completely free to join. There's a one-time fee to become a Gopher Pro or Gopher Pro+ . This is totally optional, but highly recommended in active areas. You can learn more about becoming a Gopher Pro and the corresponding perks on the Gopher website.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "Why can't I enter my address?", "a": "That sounds like a location permissions issue from your phone. Go to your phone settings, select the Gopher Go app, and make sure location settings are set to allow .", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "Why can I not see requests?", "a": "There are a few reasons: If your Payout Account is not set up, you won't see full request details. Once completed, you'll be able to view and accept requests. Your Work Settings & Radius are not complete. Once you've added all the job categories you're interested in and saved, you'll see all jobs within the radius you've set. If Gopher is new to your area, there might not be any jobs posted currently.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "Why isn't there a pick-up address listed?", "a": "Often when a customer wants a delivery for an item available from several locations, they select “Gopher can purchase from anywhere.” In this case the pick-up address is listed as “Gopher's Choice,” meaning you can go to the closest store. You can also contact the Requestor in the app to ask if there's a particular store they recommend.", "kw": "", "audience": "any", "topic": ""}, {"group": "Workers", "q": "Can I use my previous background check results to become a Gopher Pro?", "a": "Unfortunately not. Each company sets its own adjudication matrix (the guideline for making consistent, fair decisions about background check results). We need to ensure each candidate is evaluated with the same criteria, so we cannot accept a background check using unknown criteria. In active areas, the small one-time investment comes back ten-fold when you factor in the Gopher Pro perks.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "What assurance do I have on getting paid for a purchase request?", "a": "If you accept a request where a purchase is needed, these require an initial out-of-pocket expense. That amount, along with your offer, is paid out immediately after the request is completed. You are never required to accept a 'purchase needed' request and can always ignore them. Because the Gopher marketplace doesn't have partnerships or contracts with vendors, users avoid extreme mark-ups. Whenever you see a request, the money is already pre-authorized, so you are guaranteed the amount once the request is completed.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Why do I have to pay for the items requested?", "a": "If you accept a request where a purchase is needed, it requires an initial out-of-pocket expense. This amount, along with the offer, is paid out immediately after the request is completed. You are never required to accept a 'purchase needed' request and can always ignore them. Because the Gopher marketplace doesn't have structured partnerships or contracts with vendors, users avoid extreme mark-ups. For certain items there is no option to purchase in advance online or through an app, so the cost-of-goods option is how these are provided. All age-restricted items cannot be delivered by a Gopher under 21, and cannot be received by a user under 21 without a valid government-issued ID.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "My request went through but cancelled shortly after — what happened?", "a": "Your request went through fine but cancelled shortly after. We recommend giving it a little longer to help us find a local Gopher. If you still need your items, you can go to your Dashboard -> Account -> Request History -> Cancelled.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "My account was deactivated after a cancellation — how do I get reinstated?", "a": "For a first-time cancellation we will not charge the cancellation fee. We temporarily deactivate the account until you confirm you've read our FAQs and Terms and Conditions, which helps you understand the platform better. Once you confirm you understand the Terms and Conditions of usage, we can reinstate your Gopher Go account.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Why isn't Stripe accepting my debit card?", "a": "We're sorry Stripe isn't accepting your card. Per our agreement with them, we're at their mercy regarding which cards are accepted. They accept most cards, however for payout accounts (not payments) some are not available. You can check the list of available debit cards on Stripe's instant-payouts banks page. Cards issued from online or virtual banks usually do not qualify.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How do I see requests / why don't I see any jobs?", "a": "We may be just getting to your area. As long as your notifications are on and your payout account is set up, you're ready to go. When requests pop up in your area, you'll receive an app notification and see the details of the task. In the short term, referring the app to others is a great way to get your community up and running sooner. Also check Work Settings & Radius to ensure the job categories you want are selected.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Can I share my phone number or contact info through in-app messaging?", "a": "Providing cell phone numbers, email, or other personal contact info through in-app messaging is a violation of our terms. When a request is broadcast, available Gophers can message a Requestor if more info is needed, but misuse of this feature to recruit Requestors off the app for personal gain is prohibited and can result in your account being permanently removed. Please communicate with courtesy and professionalism, and flag any messages with inappropriate content.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "I'm not getting a response to my questions, offers, or bids — what do I do?", "a": "You have Gophers interested in your request. You can view your bids and questions by going to your Dashboard and selecting 'Requests.' Your live request appears in the middle of the screen — tap it and you'll see all the new request information available, where you can review names, ratings, reviews, and work history, and approve or decline offers. If you'd prefer not to engage during the process, you can use 'first available' and make a fair offer so a Gopher is on their way as soon as they accept.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "My labor/moving request expired quickly — how do I improve my chances?", "a": "Labor and moving jobs are work we find regularly, but the people who do these moves are typically working and might not see a request in a short window. We recommend setting the broadcast time to an hour or more, which dramatically improves your chances of it being accepted. You can re-request via Account -> Request History -> Expired.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Why isn't my request being accepted (Make Me An Offer)?", "a": "The likelihood of a request being accepted goes up dramatically when you make the offer. Often a Gopher may not know the price of the items you're requesting, and instead of guessing they don't get involved. You can edit your request at any time to reflect the cost of items needed and how much you'd like to pay the Gopher for the purchase, time, and travel.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "When do I get paid?", "a": "When you update the request as 'complete,' the Requestor is immediately sent a notification and a text message to confirm completion. We recommend sending a friendly reminder to update their app. In the rare event they don't, the payout is automatically released 48 hours after you completed the request. A Gopher's payout speed starts at 'standard' (within about 4 hours, up to a full business day depending on your bank). After 10 successfully completed transactions, your payout speed upgrades to 'instant' and funds arrive immediately. You can check status in Dashboard -> Account -> Request History -> Completed.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How do I cash out?", "a": "Cash out is automatic once you complete the order: you select complete and the customer confirms, which initiates the payout. For the first 10 requests, Stripe's payout speed is 'standard,' taking 3-4 hours or up to next day depending on your bank. After 10, your payout speed upgrades to 'instant,' which takes only 1-2 minutes. If you become a Gopher Pro+ or Pro, you're automatically upgraded to instant.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Do I have to pay out of pocket?", "a": "When you see a 'purchase needed' icon, the Requestor is asking you to purchase something on their behalf because they can't buy it online or in advance. For example, '$40 Total ($15 Earned - $25 Spent)' means the cost of items is $25 (which you pay initially) and they're offering $15 for you to earn. When you complete the request, you receive the entire $40 deposited into your bank account. Whenever you see a request, the money is already pre-authorized, so you're guaranteed the amount once completed.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "What do I need to do to confirm a customer's ID for age-restricted items?", "a": "You are required to make sure the person receiving the items has their ID on them and that it's a valid government-issued ID. Once confirmed, you can hand over the items. If the customer is TrustShield verified, you'll see their ID and picture in your app, but you still need to see the physical ID in person so it matches. We encourage all users to add TrustShield ID verification for extra trust and security.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Am I taxed or 1099'd by Gopher?", "a": "The Gopher marketplace is different from other gig marketplaces. As a user of the Gopher Go app you aren't an employee or even an independent contractor for Gopher, Inc. We simply broadcast unique requests from users in hopes of finding someone to help. Your tax liability to Gopher, Inc. is zero. We're not tax advisors, but hypothetically a Requestor (if a business using the app for business purposes) could choose to 1099 a Gopher and would need to declare that in the request description in advance; if you weren't interested you could ignore it.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "What happens if no one accepts my request?", "a": "If you submit a request and we aren't able to connect you with a Gopher, the request will simply expire. There will be no charge for this — not even a pre-authorization. If your app notifications are on, we'll send you an inbox message when your area becomes active. You can help speed that up by using the Refer App feature to tell friends and family about the Gopher Marketplace.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "I get a notification about a job but there's nothing there when I open it — why?", "a": "When requests come into new markets, they're accepted quickly initially, so by the time you open it the job may already be taken. More requests are popping up on the platform each day. Keep your notifications on and consider using the Refer App feature to help your area become active sooner.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How long does it take for a Gopher to accept an offer?", "a": "In our active markets, it's usually within 30 seconds or so, provided the offer is reasonable (we help inform you if it isn't). In newer areas it can take longer. If we aren't able to connect you with a Gopher, the request will just expire with no charge — not even a pre-authorization.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Stripe says my payout account needs attention — what do I do?", "a": "Stripe reported an issue with the information provided when setting up your Gopher payout account — often the ID image wasn't clear enough to verify. Please use the secure link Stripe/Gopher provided to correct the issue. Once corrected, your payout account can be verified.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "My request has sat for over an hour even though it shows many Gophers available — why?", "a": "The number shown reflects potential workers who've signed up near your address; it doesn't guarantee someone is available right now to accept. We may still be getting active in your area. If your request expires you won't be charged anything — not even a pre-authorization. In the meantime we try to notify local workers with additional alerts beyond the standard app notification.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Where is my order?", "a": "When you enter your address, we show how many workers have joined the platform within about 10 miles. In some areas we don't have many workers available yet, though our platform can change that quickly. Any time a request is made in a new area, we work to spread the word locally. You can help via the Refer App feature or social media — we've seen new communities embrace the app in as little as 24 hours. If a request isn't accepted, it simply expires with no charge.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Are there Gophers in my city / area?", "a": "We may have several people who recently joined the Gopher Go app in your area, even if we don't consider it fully 'active' yet — the app is fully operational. If you make a request and it isn't accepted, it will just expire with no charge, not even a pre-authorization. Keep in mind we're not an auto-fulfillment marketplace; it depends on whether a worker is willing to take the request for the offer you make. Increasing your offer can help attract workers.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "My age-restricted request shows $0 in cost of goods — what do I enter?", "a": "If your delivery request shows $0 in the cost-of-goods section, you'll need to input the cost of your items there (including tax). No money is earned in that field — the Gopher uses it to pay for your items. The amount the Gopher earns goes in the 'Payment to your Gopher' section. You can edit your request at any time while it's broadcasting.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How do I sign up as a worker (from a job posting)?", "a": "The jobs are found on the Gopher Go App. It costs nothing to sign up, and offers same-day transparent payouts. As long as you have a Gopher Go account set up, you'll be ready when jobs start to pop up. You can learn more at gophergo.io/become-a-gopher.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "A customer was unhappy because their low offer wasn't accepted — how does pricing work?", "a": "Gopher is not an auto-fulfillment delivery service. We're an open marketplace that broadcasts a person's needs to workers in the area, and those workers decide if the offer makes sense to them. Because Gophers don't work for us, we don't intervene with the price. As perspective, a typical delivery takes 30-45 minutes, so a $5 offer can work out to roughly $7.50-$10/hour — and the Gopher only earns exactly what you offer. If an offer isn't getting accepted, raising it can help.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "I can't see requests — do I need a payout account?", "a": "You'll need to set up your payout account in order to view requests. Go to Account -> Payout Account and follow the instructions to add your ID and debit card. It takes about 1-2 minutes, and as soon as your account is verified you can start taking requests. Reviewing the onboarding tutorial and FAQs (More -> Help Center -> Frequently Asked Questions) is very helpful.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "My request expired — can I resubmit it?", "a": "Sorry your request expired. We may have drivers in your area, but since we're just getting started they may not have notifications on. If you still need your items, we can try resubmitting and attempt to get their attention via text and email as well.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How do I start the Gopher Pro background check (Yardstik)?", "a": "We can reset your Gopher Pro invite to your email address. Look out for an email from Yardstik, our trusted background check partner (or use the link provided). In the meantime, make sure you're on the latest version of Gopher Go, your profile info is current, and your payout account is set up.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "I have a duplicate account — what happens?", "a": "Gopher only allows one account per user. If a duplicate account is identified (often during a payout account update), we deactivate the duplicate and keep your active account. If you have completed transactions and a good rating on your original account, we recommend keeping that one and simply updating the number and email. Let us know the correct email and SMS you want to use.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Can I use an existing or previous background check to become a Gopher Pro?", "a": "Unfortunately not. Each background check company uses a different adjudication matrix (the detailed criteria for evaluating results), so we can't accept a check done under unknown criteria. To receive the Gopher Pro+/Pro badge you'll need to go through the Yardstik process. In active markets, the one-time investment can pay back quickly, so it's worth evaluating whether your area is active enough first.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "I can't see requests — could it be a bug or app version issue?", "a": "Try signing out and signing back in. If that doesn't work, delete the app from your device and reinstall it (don't delete your actual Gopher account) — this clears any previous bug tied to an old version. Let us know if it helps.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Am I all set up on Gopher Go?", "a": "Your account is generally ready once your profile photo, confirmed email, 'About Me' bio, and payout account are complete, and your Work Settings & Radius reflect the jobs you want. Reviewing the Gopher Go Tutorial and FAQs will quickly get you up to speed on everything you need to know.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "My debit card isn't being accepted for payout — why?", "a": "Stripe accepts virtually all US bank debit cards (you can check the supported list on Stripe's instant-payouts banks page). If your card is issued from an online bank or virtual bank, most of those don't qualify for instant payouts.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Why isn't my payment card working when a Gopher accepts my request?", "a": "When a Gopher accepted your request it triggered an authorization, and that's where the error occurred. You'll need to use a different card, and we recommend contacting your bank as well.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How does making a request work?", "a": "If your offer is accepted you'll get a notification immediately, and you'll be updated through the app every step of the way. If your order isn't accepted after a few minutes, consider changing your offer amount. Gopher is not an auto-fulfillment delivery service — it's a marketplace for services, and the 'payment to your Gopher' is 100% what they make, so it helps to view your offer like an hourly wage (age-restricted deliveries can take 45-60 minutes).", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "You charged me even though my request was just broadcast — is that right?", "a": "Your card is not authorized or charged simply by broadcasting a request. When your request is accepted, your card is pre-authorized (typically total request cost plus about 20%). Once your Gopher completes the request, the final amount is charged and you'll get a notification in-app and via SMS to select 'Confirmed,' which initiates the payout. If no confirmation is taken, the request auto-completes within 48 hours; after that grace period it can't be cancelled, refunded, or disputed.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "My payout card failed after I completed a request — what now?", "a": "If your original payout card fails (often because the bank doesn't accept it), deposit attempts will occur daily until a valid card is updated. Your money is always guaranteed in your Stripe account once the customer confirms. Once a new valid card is linked, it's assigned the next business day and deposits the following business day. It's important to keep a valid debit card on file before completing a request, because an initial failed deposit causes a delay Gopher can't speed up.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How do I change the phone number on my account?", "a": "Because sign-up and sign-in are exclusively via SMS, to change your number after signing up, reply with a copy of your ID along with the new number. We'll verify the ID, change the number, and confirm once completed.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Did my request go through?", "a": "If we don't see a request submitted from your account, it typically means a required field was missed or the submit button wasn't selected on the 'Review Request' screen. Reviewing the Gopher Tutorial helps walk through the full request flow.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Why hasn't my money been deposited after my first completed request?", "a": "A payout requires a valid card on file when the customer confirms. For the first 10 completed requests, once a request is confirmed it deposits within about 1-3 hours depending on your bank; from request #10 onward you're upgraded to 'instant' (1-2 minutes). If the card isn't valid, attempts run daily until a new card is updated, then it's assigned the next business day and deposits the following business day. The money is yours — once the card is good, it just needs to run its course through Stripe and your bank.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How are you different from DoorDash, Uber, and similar apps?", "a": "Gopher is quite different: you can come and go without penalty; each job's earnings are shown with 100% transparency before you accept, and once completed you're paid that exact amount directly into your bank; if earnings seem too low you can submit an instant counter-offer; you can be selected as a 'Favorite Gopher' so a Requestor can request you specifically; if needs change, you can agree on a new price in the app for immediate approval; and you work directly for the Requestor for that job, not for us — making you a truly independent contractor.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "As a worker, do I pay for the items?", "a": "Sometimes items are already paid for (the customer ordered online or via an app); sometimes not — always check the request details. A 'Purchase Needed' icon means the Requestor wants you to buy something on their behalf. For example, '$40 Total ($15 Earned - $25 Spent)' means items cost $25 (which you pay initially) and you earn $15; on completion you receive the full $40 in your bank. If you're not interested in 'Purchase Needed' requests, simply ignore them rather than accepting and cancelling. The money is pre-authorized, so you're guaranteed the amount once completed.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How do I turn off / avoid getting deactivated for cancelling requests?", "a": "Cancelling a request is a major inconvenience to the person who made it, and all request info (what's needed, when, distance, purchase amount, etc.) is shown before you accept. To avoid a cancellation fee and stay on the platform, only accept requests you can complete, and review the Gopher Go Tutorial and FAQs. When you accept, the customer's card is authorized; if you cancel, they have to re-request, triggering another authorization, which frustrates customers. First-time cancellations usually aren't charged, but repeated unnecessary cancellations can lead to removal.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Why is there a Cost of Goods amount on a request?", "a": "The Cost of Goods is the money you (the worker) use to purchase the requested items on the customer's behalf — it is not part of your earnings. Your earnings are entirely what's entered in the 'Payment to your Gopher' field. When you complete the request you receive both amounts (cost of goods plus your offer) deposited together.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How do I set up my payout account if I don't have an ID?", "a": "A valid government-issued ID is required to set up and verify your Stripe payout account, since Stripe must verify your identity before releasing funds. Without a verifiable ID, the payout account can't be completed, which means requests can't be accepted. If your ID image was rejected, re-submit a clear photo via the secure Stripe link.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Why was I charged for not providing my ID during an age-restricted order?", "a": "Before submitting an age-restricted request, customers are clearly informed they must present a valid ID in person to receive the items, and that if they can't provide ID after the Gopher has already made the purchase, they're responsible for the entire charge. This protects the worker from being shorted on items they paid for. Contactless delivery is never permitted for age-restricted items.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Is contactless delivery allowed for age-restricted items?", "a": "No. Contactless delivery is not permitted for age-restricted deliveries on the platform, and it isn't legal in any state. The customer must show a valid ID to be scanned in person to receive their items. Requests for a mailbox, porch, or other drop-off must be declined. Customers are told in advance that if they can't provide ID after purchase, they're responsible for the entire transaction.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How do I update my email address?", "a": "You can update your email by going to Dashboard -> Account -> Your Profile and tapping on your email address to change it. This matters because if your email is undeliverable, we can't respond to your contact-us submissions.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Why do I need TrustShield ID verification?", "a": "ID setup is required for age-restricted deliveries. TrustShield keeps the platform compliant and reassures both customers and workers that it isn't being misused. Once your Gopher TrustShield is authenticated, you don't need to enter it again, and you get $1 off each age-restricted order thereafter. You're still required to show ID during delivery, but ordering becomes much faster — especially using request history.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How long does it take to get a Gopher?", "a": "It depends on how many workers are available near you and how much you're offering. Because Gopher isn't auto-fulfillment, think of it like hiring someone — age-restricted deliveries typically take about an hour, so view your offer roughly as an hourly wage. If you can't find someone at the original offer, raising it can attract drivers from a little further away, though a fair offer in an area with available workers is usually accepted quickly.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How do I order cigarettes / tobacco?", "a": "You can make that request right in the app. For tobacco specifically, be sure to select the correct category (Delivery - Tobacco), which keeps the request from being sold to minors. We also have how-to videos and a documented Gopher Tutorial that walk you through placing the order.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How do I turn on location services?", "a": "On Apple iPhone: Settings -> Privacy & Security -> Location Services -> (scroll to the Gopher Go App) -> Always. On Android: Settings -> Location -> Permissions Manager -> App Permissions -> (scroll to the Gopher Go App) -> Allow.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "I can't upload a photo — how do I fix it?", "a": "That's usually a photo-permissions issue from your phone. On Apple iPhone: Settings -> Privacy & Security -> Photos -> (Gopher or Gopher Go App) -> Full Access. On Android: Settings -> Privacy -> Permissions Manager -> Camera -> (Gopher or Gopher Go App) -> Allow.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Why was my request cancelled for the wrong category (tobacco / age-restricted)?", "a": "Requests can be cancelled if the wrong age-restricted category is selected, since the category helps confirm the buyer is old enough. For tobacco, use 'Delivery - Tobacco'; for other age-restricted items, use 'Delivery - Other Age-Restricted.' To fix it, open your request details, select edit, go back at the top left, choose the correct category, and resubmit — your other info is saved.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "When do I receive my payout? (full breakdown)", "a": "New Gophers receive their first 10 payouts at Stripe's 'Standard' US speed (typically about 2 hours after the customer confirms). After 10 successfully completed requests, you're upgraded to 'Instant Payout' (1-2 minutes); Gopher Pros start with Instant. Payouts initiate when you mark a request 'Complete,' which notifies the Requestor to select 'Confirmed' or 'Dispute.' If they forget, payout occurs automatically after 48 hours. Deposits go to the debit card on file. Payouts can be delayed by an expired, unsupported, compromised, bank-blocked, or cancelled card — updating to a valid card resumes pending payouts, but the delay can't be sped up.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Why haven't I been paid yet?", "a": "You can review status in Request History — typically it shows the Requestor hasn't confirmed yet on their end. After receiving items, customers sometimes aren't engaged in the app, so we send them a reminder text. For age-restricted deliveries (always done in person), we recommend asking the customer to confirm right then and there to avoid delays. If they don't, our system automatically confirms 48 hours after you entered 'complete.'", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How do I know my order was accepted?", "a": "When your order is accepted, you'll receive a unique sound notification and your screen will transition to show the worker's information and the progress of the order.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "Do you service my area / is Gopher available here?", "a": "The Gopher Marketplace is available anywhere in the US. Because workers are always moving, we can't tell from our end exactly how many are near you, but your app pings potential worker locations when you enter your request address and shows how many are within about 15 miles before you submit. Even if it shows only a few, you can still submit — there may be more outside that radius. If no one accepts, your request simply expires with no charge.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "I need a live agent / operator — can I talk to someone?", "a": "We're a marketplace to find many types of work, and we aren't able to offer live on-demand phone agents. Almost everything you need is covered in the Gopher Go Tutorial and FAQs, so we ask that you review those first. If you still have a specific question afterward, send it through the app's Contact Us link and we'll help in real time.", "kw": "", "audience": "any", "topic": ""}, {"group": "Support", "q": "How does a worker complete a request step by step?", "a": "First make sure your Gopher Go profile is complete (recent photo, confirmed email, bio) and your payout account is set up, and select the job types you want in Work Settings & Radius. When you accept a request, tap the cancellation-terms checkbox and Accept. Once connected, select Update: In Progress (this GPS/time-stamps your location), and we recommend a quick intro text to the customer. Keep updating the status accurately through purchase and drop-off, then mark Complete so the customer can confirm and trigger your payout.", "kw": "", "audience": "any", "topic": ""}, {"group": "Businesses", "q": "What is Gopher Deals?", "a": "Gopher Deals is a local marketplace that puts your business or service in front of thousands of neighbors nearby and lets you share a deal they'll love. Whether you run a business or offer a service, Gopher gets you in front of every neighbor in your area — and it's free to join.", "kw": "what is gopher deals about overview marketplace local deals Both", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "How much does it cost to join Gopher Deals?", "a": "It's free to start. You can list your business or offer your service and share a deal at no cost to get started.", "kw": "cost price free fees join pricing how much Both", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "Is Gopher Deals really free, or are there hidden fees?", "a": "It's free to start with no upfront cost to list. For merchants, Gopher takes zero commission on your sales — there are no surprise fees. For service providers, there are no per-lead charges; instead a small Deal Boost is added to what the customer pays so you still take home your full desired amount.", "kw": "hidden fees free commission catch cost charges Both", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "Who can sign up for Gopher Deals?", "a": "Two types of businesses can join: Merchants (local businesses such as restaurants, food trucks, retail, grocery, convenience, and more) and Service Providers (skilled, top-rated pros who offer a service). There's a dedicated sign-up path for each.", "kw": "who can join eligibility sign up merchant service provider qualify Both", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "What's the difference between a Merchant and a Service Provider on Gopher?", "a": "A Merchant is a local business (like a restaurant, food truck, retailer, or store) showcasing products and deals that customers buy directly from them. A Service Provider is a skilled pro offering a service (like labor, yardwork, or assembly) where you set the price you want to earn for the job. Each has its own registration flow.", "kw": "merchant vs service provider difference business type which one Both", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "How do I get started?", "a": "Pick your path on the Gopher Deals page: choose 'I'm a Merchant' to list a business and its deals, or 'I'm a Service Provider' to offer a service. Fill in the short registration form, preview your deal, and submit. It's free to start.", "kw": "get started how to start begin sign up register onboarding Both", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "How do I register my business as a merchant?", "a": "Choose 'I'm a Merchant' and complete the registration form. You'll add your Business Info (name, logo, tagline, address, website, and category), Your Deal (the deal you're offering, an optional promo code, and up to 3 searchable keywords), and Business Owner Verification (owner name, phone, email, and address). Then you preview your deal and submit it for review.", "kw": "register merchant sign up business merchant form registration onboarding steps Merchant", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "What information do I need to register as a merchant?", "a": "You'll need your business name, logo (PNG or JPG, square works best), a business tagline, business address, your website URL, your business category, the deal you're offering (plus an optional promo code), up to 3 searchable keywords, and owner verification details (name, phone, email, address).", "kw": "merchant requirements what do I need information needed registration details Merchant", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "How do I register as a service provider?", "a": "Choose 'I'm a Service Provider' and complete the form. You'll add your Deal Info (the deal you're offering and up to 3 searchable keywords), your Earning Info (what you want to earn, which sets what the customer pays), and Your Info (name, phone, email, and the city/area you serve). Then submit your deal.", "kw": "register service provider sign up pro provider form registration onboarding steps Service Provider", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "What information do I need to register as a service provider?", "a": "You'll need a description of the deal you're offering, up to 3 searchable keywords, the exact amount you want to earn, and your contact info (name, phone, email, and the city or area you serve).", "kw": "provider requirements what do I need information needed registration details Service Provider", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "What business categories can I choose from?", "a": "Merchant categories include Restaurant & Food Trucks, Local Business, Convenience Store, Age-Restricted, Retail, and Grocery Store.", "kw": "categories business category restaurant retail grocery convenience types Merchant", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "How long does it take to go live after I register?", "a": "After you submit your deal, Gopher will provide your activation date within 5 business days.", "kw": "activation go live how long timeline approval time when live 5 business days Both", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "What happens after I submit my deal?", "a": "You'll see a confirmation that you've registered, and Gopher will follow up with your activation date within 5 business days. Then your deal goes out to neighbors nearby.", "kw": "after submit next steps what happens confirmation review process Both", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "Can I preview my deal before submitting it?", "a": "Yes. Merchants get a 'Preview Your Deal' step that shows exactly where and how your deal will appear before you submit, and you can go back to edit your info at any point.", "kw": "preview see deal before submit review edit deal Merchant", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "Can I edit my information during registration?", "a": "Yes. During the preview step you can use 'Go back and edit my info' to change any details before final submission.", "kw": "edit change info go back correct details update registration Both", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "What kind of deal can I offer?", "a": "You can offer whatever deal you want. Gopher recommends offering something trackable that feels exclusive to Gopher Marketplace users, so you can measure results and give neighbors a reason to choose you.", "kw": "what deal type of deal offer promotion discount exclusive deal Merchant", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "Do you have tips for creating a good deal?", "a": "For merchants: offer something trackable and exclusive to Gopher users. For service providers: be clear with your deal, make it appealing to a large group, and keep disclaimers low — that helps more neighbors book you.", "kw": "deal tips best deal advice how to create deal good offer examples Both", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "Can I use a promo code with my deal?", "a": "Yes. Merchants can add an optional promo code to their deal during registration. This is a great way to make the offer trackable.", "kw": "promo code coupon discount code tracking optional Merchant", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "What are searchable keywords and how do they work?", "a": "When customers browse deals, they can type in keywords to narrow their search. You enter up to 3 keywords related to your deal so neighbors can find you more easily. Choosing relevant keywords helps the right customers discover your offer.", "kw": "keywords searchable search terms tag
