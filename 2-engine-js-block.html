s discovery find my deal Both", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "How many searchable keywords can I add?", "a": "You can add up to 3 searchable keywords related to your deal.", "kw": "how many keywords limit 3 keywords maximum Both", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "Can I change my deal after it goes live?", "a": "Your deal and details are submitted through your registration. To update an existing deal, reach out through Gopher (deals@gophergo.io) and they can help you adjust it.", "kw": "change deal edit deal update modify offer after live Both", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "How often are new deals added?", "a": "New deals are added daily on the Gopher marketplace.", "kw": "new deals how often daily frequency updates Both", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "Does Gopher take a commission on my sales?", "a": "No. For merchants, Gopher takes zero commission on your sales. Customers buy directly from you, and every dollar of your margin stays with you.", "kw": "commission cut percentage fees on sales take rate margin Merchant", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "How do I keep my full margin with Gopher?", "a": "Because Gopher charges no commission, customers buy directly from your business and you keep 100% of your margin — there's no platform cut eating into profitable orders the way big delivery platforms do.", "kw": "keep margin full margin 100% profit no commission Merchant", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "Do I have to pay for leads as a service provider?", "a": "No. You never pay for a lead. Instead, you get paid first with every service deal you provide. The customer pays a small Deal Boost on top, so you make exactly what you're charging for your offer.", "kw": "pay for leads lead cost no leads lead gen per lead lead fees Service Provider", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "What is the Deal Boost?", "a": "The Deal Boost is a small 10% amount added to what the customer pays, which helps your deal reach more serious, ready-to-book customers. For example: you earn $100, the customer pays $110, and you still take home your full $100. It promotes your deal to high-intent customers and helps you stand out for better, faster bookings.", "kw": "deal boost 10% boost how it works customer pays markup promotion fee Service Provider", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "How much will the customer pay if I set my price?", "a": "You set the exact amount you want to earn, and a small 10% Deal Boost is added on top for the customer. Example: if you want to earn $100, the customer pays $110 — and you still take home the full $100.", "kw": "customer pay price what they pay boost calculation total 10 percent Service Provider", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "Do I really take home the full amount I set?", "a": "Yes. The amount you enter for 'What do you want to earn?' is exactly what you'll see deposited into your payout account once the job is done. The Deal Boost is added on top of that for the customer — it doesn't come out of your earnings.", "kw": "take home full amount earnings payout keep what I earn net pay Service Provider", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "When do service providers get paid?", "a": "You're paid the moment you finish the job — no waiting and no chasing invoices. The amount you set is deposited into your payout account once the job is done.", "kw": "when paid payment timing get paid payout after job immediate invoices Service Provider", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "How does setting my own price work?", "a": "You name the exact amount you want to earn for your service — there's no underbidding war. Your deal stands on quality, reliability, and reputation, so skilled work gets paid like skilled work, similar to submitting a standard Gopher Go bid.", "kw": "set price name your price bidding control pricing premium own rate Service Provider", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "Will I have to inflate my prices like on delivery apps?", "a": "No. Because Gopher charges no commission, there's no reason to inflate. Your Gopher pricing can match your in-store pricing — no surprise fees, no customer resentment, and no reputational hit from app-only markups.", "kw": "inflate prices menu inflation markup same price in-store price surge Merchant", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "How far does my deal reach? What's the radius?", "a": "Service providers can have their deal seen by every Gopher user within a 0–50 mile radius of the request — and you set that radius. Merchants showcase their business and deals to Gopher users in the local area nearby.", "kw": "radius miles reach distance how far 50 miles coverage area range Both", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "Can I control how far my deal is shown?", "a": "Yes — as a service provider you set your own radius, anywhere from 0 to 50 miles of your request, so you control how local or wide your reach is.", "kw": "control radius set distance choose range adjust reach miles setting Service Provider", "audience": "business", "topic": "deals"}, {"group": "Businesses", "q": "How many potential customers will see my deal?", "a": "It depends on your area, but Gopher puts your business or service in front of thousands of neighbors nearby. You can use the 'View Your Audience' tool on the site to see how many customers and workers are already active near you before you sign up.", "kw": "audience size how many customers reach potential customers view audience Both", "audience": "business", "topic": "deals"} /* ================================================================
   FUZZY SEARCH (no library) — token-aware, typo-tolerant
   ================================================================ */
function subseqScore(q, text){
  q=q.toLowerCase(); text=text.toLowerCase();
  let ti=0, gaps=0, first=-1;
  for(let qi=0; qi<q.length; qi++){
    let found=-1;
    for(let k=ti;k<text.length;k++){ if(text[k]===q[qi]){found=k;break;} }
    if(found===-1) return null;
    if(first===-1) first=found;
    if(qi>0) gaps += found-ti;
    ti=found+1;
  }
  return gaps + first*0.3;
}
const STOP=new Set(['the','a','an','to','of','do','i','my','is','it','for','in','on','can','how','what','when','where','why','am','are','be','and','or','if']);
// Low-information words: common enough that matching ONLY these shouldn't count as a
// real FAQ hit (they appear in tons of questions). A query needs at least one word
// outside both STOP and LOWINFO to produce a confident match.
const LOWINFO=new Set(['you','your','offer','offers','get','got','need','want','make','made','have','has','does','will','would','should','could','about','with','this','that','some','any','please','help','there','here','they','them','use','using','used']);
// does word w appear in text, exactly OR as a close (typo-tolerant) match? returns 0=exact, 1=fuzzy, null=no
function wordIn(w, text){
  if(text.includes(w)) return 0;
  // check each token in text for a tight subsequence (1 short gap = likely typo)
  for(const t of text.split(/[^a-z0-9]+/)){
    if(!t || Math.abs(t.length-w.length)>2) continue;
    const s=subseqScore(w,t);
    if(s!==null && s<=2.2) return 1;
  }
  return null;
}

const CAT_STOP=new Set("a an the the to of for i need my me you we is it do does can someone help with this and or in on at".split(" "));
function catNorm(s){ return s.toLowerCase().replace(/u[-\s]?haul/g,'uhaul').replace(/[^a-z0-9 ]/g,' '); }
function catWords(s){ return catNorm(s).split(/\s+/).filter(w=>w && !CAT_STOP.has(w)); }

// Light stemmer: collapses common word-forms so "mover/movers/moving/moved"
// all match the same root. Fixes singular/plural & verb-form vocabulary gaps.
// Words short enough that aggressive stemming would cause false collisions
// (e.g. "ride" must not become "rid"). Returned as-is.
const STEM_KEEP=new Set(['ride','rides','riding','side','tide','wide','dome','time','line']);
function stem(w){
  if(w.length<=3 || STEM_KEEP.has(w)) return w;
  // strip a trailing plural 's' first (but not 'ss')
  if(w.endsWith('s') && !w.endsWith('ss') && w.length>4) w=w.slice(0,-1);
  // verb/agent/gerund suffixes
  if(w.endsWith('ing') && w.length>5) w=w.slice(0,-3);
  else if(w.endsWith('er') && w.length>4) w=w.slice(0,-2);    // mover->mov, cleaner->clean
  else if(w.endsWith('ed') && w.length>4) w=w.slice(0,-2);
  // normalize trailing silent 'e' so "move"->"mov" matches "mover"->"mov"
  if(w.endsWith('e') && w.length>3) w=w.slice(0,-1);
  return w;
}
function stemSet(arr){ const s=new Set(); arr.forEach(w=>{ if(w && w.indexOf(' ')===-1) s.add(stem(w)); }); return s; }

function scoreCategories(query){
  const qn=catNorm(query).trim();
  const qw=new Set(catWords(query));
  const qstem=new Set([...qw].map(stem));
  if(qw.size===0) return [];
  const scored = CATEGORIES.map(c=>{
    let s=0;
    // phrase match (strong)
    for(const p of c.phrases){
      if(p===qn){ s+=10; break; }
      if((p.length>=6 && qn.indexOf(p)!==-1) || (qn.length>=6 && p.indexOf(qn)!==-1)){ s+=6; break; }
    }
    // token overlap (related words / objects / *_types) — stem-aware
    const tokStems=stemSet(c.tokens); let tok=0;
    qstem.forEach(w=>{ if(tokStems.has(w)) tok++; });
    s += 2.5*tok;
    // strong hint keywords (professions, verbs) — stem-aware
    const hintStems=stemSet(c.hints); let hk=0;
    qstem.forEach(w=>{ if(hintStems.has(w)) hk++; });
    s += 4*hk;
    // soft phrase-word overlap (intent phrasing) — stem-aware
    const pwStems=stemSet(c.pwords); let soft=0;
    qstem.forEach(w=>{ if(pwStems.has(w)) soft++; });
    s += 1.0*soft;
    return { score:Math.round(s*10)/10, label:c.label, slug:c.slug, blurb:c.blurb };
  }).sort((a,b)=>b.score-a.score);
  return scored;
}

const CAT_THRESH = 4;          // min score to show a service card
const CAT_RELATED = 2;         // softer bar for "next best" related suggestions
const CAT_HIGH = 8;            // top score at/above this (and clearly ahead) = very confident
function classifyIntent(query){
  const scored=scoreCategories(query);
  if(!scored.length || scored[0].score < CAT_THRESH) return [];   // not a service request
  const out=[scored[0]];
  if(scored[1] && scored[1].score >= Math.max(CAT_THRESH, scored[0].score*0.65))
    out.push(scored[1]);
  return out;
}
// Returns {top, confidence:'high'|'less', scored} or null. 'high' = strong, clearly-ahead
// match (clean card, no alternatives). 'less' = matched but lower or with a close rival
// (shaded card + show alternatives).
function classifyWithConfidence(query){
  const scored=scoreCategories(query);
  if(!scored.length || scored[0].score < CAT_THRESH) return null;
  const top=scored[0], second=scored[1]?scored[1].score:0;
  // "high" when the top clearly wins: either a strong score with a clear lead, OR
  // there's essentially no competition (runner-up well below threshold). A modest
  // score like "electrician"(4) with nothing else near is still a confident match.
  const clearLead = (top.score - second) >= 4;
  const noRival   = second < CAT_RELATED;            // nothing else even mildly relevant
  const strong    = top.score >= CAT_HIGH;
  const confidence = ((strong && clearLead) || noRival) ? 'high' : 'less';
  return { top, confidence, scored };
}
// Related categories to offer as "next best" — scored above the softer bar,
// excluding any slugs already shown on the main card.
function relatedCategories(query, excludeSlugs){
  const ex=new Set(excludeSlugs||[]);
  return scoreCategories(query)
    .filter(c=>c.score>=CAT_RELATED && !ex.has(c.slug))
    .slice(0,4);
}
// Cross-category overlap terms: these route primarily to another category (Yard,
// Moving, Junk) but per the Home/Office Services dataset are also valid home/office
// work, so we surface Home/Office Services as a "close match". Extend this set when
// future datasets introduce overlap terms (the standing pattern for collisions).
const ALSO_HOME_SERVICES=new Set(['gutters','gutter','deck','driveway','fence','patio','trim',
  'lawn','mulch','hedges','hedge','trees','tree','weeds','weed','leaves','leaf','garden',
  'sofa','couch','dresser','boxes','box','stairs','piano','appliances','appliance','shed','office']);
function crossAffinity(query, excludeSlugs){
  const ex=new Set(excludeSlugs||[]);
  if(ex.has('home_services')) return [];           // Home is already the card / shown
  const qstem=new Set(catWords(query).map(stem));
  let hit=false;
  ALSO_HOME_SERVICES.forEach(t=>{ if(qstem.has(stem(t))) hit=true; });
  if(!hit) return [];
  const hc=CATEGORIES.find(c=>c.slug==='home_services');
  return [{score:0, label:hc.label, slug:hc.slug, blurb:hc.blurb}];
}

const SYNONYMS = {
  order:['request','delivery'], orders:['requests','deliveries'],
  paid:['payout','pay','deposit','cash','money'], pay:['payout','paid'],
  cashout:['payout'], 'cash':['payout','money'],
  refund:['cancel','dispute','charge'], cancelled:['cancel','expired'],
  cancel:['cancellation'], driver:['gopher','worker'], drivers:['gophers','workers'],
  worker:['gopher','driver'], tip:['offer','payment','wage'], tips:['offer','payment'],
  cigarettes:['tobacco','cigs','age-restricted'], cigs:['cigarettes','tobacco'],
  cig:['cigarette','tobacco'], alcohol:['age-restricted'], beer:['age-restricted'],
  id:['identification','trustshield'], card:['debit','stripe','payout'],
  bank:['stripe','card','deposit'], fee:['cost','charge','fees'],
  cost:['price','fee','charge'], price:['cost','offer'],
  signup:['sign','register','account'], register:['signup','account'],
  photo:['picture','pic','image'], pic:['photo','picture'],
  location:['gps','address'], background:['yardstik','check'],
  pro:['badge','yardstik'], taxes:['1099','tax','taxed'],
};
function expandQuery(q){
  const out=new Set();
  q.toLowerCase().split(/\s+/).filter(Boolean).forEach(w=>{
    out.add(w);
    if(SYNONYMS[w]) SYNONYMS[w].forEach(s=>out.add(s));
  });
  return [...out];
}
// Detect whether a DEALS question is being asked from the customer side
// ("find/use/any deals near me") or the business side ("list/offer/join, sell a deal").
// Returns 'customer', 'business', or null (not clearly a deals question / neutral).
const DEAL_CUST=['find','findie','browse','use','using','redeem','any','available','near','get','buy','order','save','savings','shop','cart','track','customer','as a customer'];
const DEAL_BIZ=['list','offer','offering','post','create','join','sign up','signup','register','sell','selling','merchant','vendor','my business','my deal','my store','promote','advertise','commission','onboard'];
function dealAudience(query){
  const q=' '+query.toLowerCase()+' ';
  if(q.indexOf('deal')===-1) return null;        // not about deals at all
  let cust=0, biz=0;
  DEAL_CUST.forEach(w=>{ if(q.indexOf(' '+w)>=0||q.indexOf(w+' ')>=0) cust++; });
  DEAL_BIZ.forEach(w=>{ if(q.indexOf(w)>=0) biz++; });
  // possessive "my" strongly implies business ("my deal", "my business")
  if(/\bmy\b/.test(q)) biz++;
  if(biz>cust) return 'business';
  if(cust>biz) return 'customer';
  // tie / no cues: a bare "deals" question from the help bar is most often a customer
  // wondering what deals are — lean customer, but weakly (ranking still shows both).
  return 'customer';
}

function scoreRec(query, rec){
  const q=query.trim().toLowerCase();
  if(!q) return null;
  const Q=rec.q.toLowerCase(), A=(rec.a+' '+(rec.kw||'')).toLowerCase();
  const words=q.split(/\s+/).filter(Boolean);
  const keyWords=words.filter(w=>w.length>=3 && !STOP.has(w));

  // GUARD: if the query has NO meaningful content words (it's all filler like
  // "can", "do you", "offer"), don't manufacture a confident match. This is what
  // stops half-typed questions from latching onto "Can I..." FAQs.
  const contentWords=keyWords.filter(w=>!LOWINFO.has(w));
  if(contentWords.length===0) return null;

  // terms = the user's meaningful words (denominator for coverage). Prefer true
  // content words; fall back to keyWords only if needed.
  const terms=contentWords.length?contentWords:(keyWords.length?keyWords:words);
  // synExtra = ONLY the extra words synonyms add (used as a bonus, never a penalty).
  const synSet=new Set(expandQuery(q).filter(w=>!STOP.has(w)&&w.length>=3));
  terms.forEach(w=>synSet.delete(w));
  const synExtra=[...synSet];
  let best=Infinity;

  // 1. exact phrase — strongest
  if(Q.includes(q)) best=Math.min(best, Q.indexOf(q)*0.05);
  if(A.includes(q)) best=Math.min(best, 9 + A.indexOf(q)*0.02);

  // 2. word-coverage in the QUESTION, measured against the user's own words.
  let exactQ=0, fuzzyQ=0;
  terms.forEach(w=>{ const r=wordIn(w,Q); if(r===0) exactQ++; else if(r===1) fuzzyQ++; });
  // synonym hits in the question give a bonus (cap so they can't dominate)
  let synQ=0; synExtra.forEach(w=>{ if(wordIn(w,Q)!==null) synQ++; });
  const coveredQ=exactQ+fuzzyQ;
  if(coveredQ || synQ){
    const frac=coveredQ/terms.length;          // 1.0 = every user word found
    let s=2 + (1-frac)*14 + fuzzyQ*1.2 + (terms.length-coveredQ)*4;
    s -= Math.min(synQ,2)*3;                    // synonym bonus, capped
    best=Math.min(best, s);
  }

  // 3. word-coverage in the ANSWER (weaker; synonyms count here too as bonus)
  let coveredA=0; terms.forEach(w=>{ if(wordIn(w,A)!==null) coveredA++; });
  let synA=0; synExtra.forEach(w=>{ if(wordIn(w,A)!==null) synA++; });
  if(coveredA || synA){
    const frac=coveredA/terms.length;
    best=Math.min(best, 14 + (1-frac)*16 - Math.min(synA,2)*2);
  }

  // 4. last-resort whole-string fuzzy (single mistyped query, no spaces)
  if(best===Infinity){
    const fq=subseqScore(q,Q); if(fq!==null) best=Math.min(best,30+fq);
    const fa=subseqScore(q,A); if(fa!==null) best=Math.min(best,55+fa);
  }
  if(best===Infinity) return null;

  // 5. AUDIENCE adjustment for DEALS questions: favor records matching the asker's
  //    side. A customer asking about deals shouldn't get business-listing FAQs first,
  //    and vice-versa. (lower score = better)
  const aud=dealAudience(query);
  if(aud && rec.topic==='deals'){
    if(rec.audience===aud)            best-=6;     // strong boost to the right audience
    else if(rec.audience!=='any')     best+=8;     // push the wrong audience well down
  }
  return best<0?0:best;
}
const FAQ_FLOOR = 12;   // scores worse than this are noise (e.g. only a filler-word echo)
function searchFaqs(query, tag){
  let pool=FAQS;
  if(tag && tag!=='*') pool=FAQS.filter(f=>f.group===tag);
  return pool.map(rec=>({rec,score:scoreRec(query,rec)}))
             .filter(r=>r.score!==null && r.score<=FAQ_FLOOR)   // drop weak matches
             .sort((a,b)=>a.score-b.score)
             .slice(0,6);
}

/* highlight + escape */
// Safety net: if any stored text still holds raw HTML entities (&ldquo; &mdash; etc.),
// decode them to real characters BEFORE we display, so users never see literal codes.
const _decoder=document.createElement('textarea');
function decodeEntities(s){ _decoder.innerHTML=s; return _decoder.value; }
function esc(s){return decodeEntities(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function hl(str,query){
  str=decodeEntities(str);
  const q=query.trim(); if(!q) return esc(str);
  const lower=str.toLowerCase();
  // 1) try the full phrase
  let idx=lower.indexOf(q.toLowerCase()), len=q.length;
  if(idx===-1){
    // 2) otherwise highlight the first MEANINGFUL word (skip stopwords/filler),
    //    preferring longer content words; never highlight a bare stopword like "can".
    const words=q.split(/\s+/).filter(Boolean)
                 .filter(w=>!STOP.has(w.toLowerCase()) && w.length>=3)
                 .sort((a,b)=>b.length-a.length);
    for(const w of words){
      const wi=lower.indexOf(w.toLowerCase());
      if(wi!==-1){ idx=wi; len=w.length; break; }
    }
  }
  if(idx===-1) return esc(str);
  return esc(str.slice(0,idx))+'<mark>'+esc(str.slice(idx,idx+len))+'</mark>'+esc(str.slice(idx+len));
}

function svgArrow(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>'; }
function svgSpark(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4z"/></svg>'; }

// Build the "Yes we can help — book now" service card from classifier hits.
// confidence: 'high' = clean solid card; 'less' = shaded 'closest match' variant.
function buildServiceCard(intents, query, confidence){
  if(!intents.length) return '';
  const top=intents[0];
  const others=intents.slice(1);
  const tentative = confidence==='less';
  let chips='';
  if(others.length){
    chips='<span class="svc-or">or:</span>'+others.map(o=>(
      '<a class="svc-chip" href="'+esc(servicesHref(o.slug))+'" onclick="openServices(\''+o.slug+'\');return false;">'+esc(o.label)+'</a>'
    )).join('');
  }
  const hint = tentative ? '<div class="svc-hint">Closest match — or try the options below</div>' : '';
  return '<div class="svc-card'+(tentative?' tentative':'')+'">'
    +hint
    +'<div class="svc-top">'
    +'<span class="svc-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>'
    +'<div class="svc-body">'
    +'<div class="svc-cat">'+esc(top.label)+'</div>'
    +'<div class="svc-blurb">'+esc(top.blurb)+'</div>'
    +'<div class="svc-actions">'
    +'<a class="svc-btn" href="'+esc(requestHref(top.slug))+'" onclick="submitRequest(\''+top.slug+'\');return false;">'+svgArrow()+'Submit a request</a>'
    +'<a class="svc-demo" href="'+esc(GOPHER_LINKS.requestDemo)+'" onclick="seeHowItWorks();return false;">See how it works</a>'
    +chips
    +'</div></div></div></div>';
}

// Emoji icon per category for the fallback grid
const CAT_ICONS={
  junk_removal:'🗑️', delivery:'📦', moving:'📦', ride_sharing:'🚗',
  yard_work_outdoor_projects:'🌿', hourly_day_labor:'💪', home_services:'🔧', other:'🤝'};
// Fallback shown when we couldn't confidently match a service OR a good FAQ.
// Lets the user self-select a category, and offers Gopher Support.
function buildFallback(query){
  const cells=CATEGORIES.map(c=>(
    '<a class="fb-cat" href="'+esc(requestHref(c.slug))+'" onclick="submitRequest(\''+c.slug+'\');return false;">'
    +'<span class="fb-ic">'+(CAT_ICONS[c.slug]||'•')+'</span>'

  )).join('');
  return '<div class="fb-card">'
    +'<div class="fb-head">Not sure that matched — what do you need help with?</div>'
    +'<div class="fb-sub">Pick a service to start a request, and a Gopher can help.</div>'
    +'<div class="fb-grid">'+cells+'</div>'
    +'<div class="fb-support"><span class="fb-q">Don\'t see what you\'re looking for?</span>'
    +'<span>You can still <a href="'+esc(GOPHER_LINKS.request)+'" onclick="submitRequest();return false;">submit a request</a> and we\'ll help you get it posted.</span></div>'
    +'</div>';
}

// "Next best" related service categories shown as chips under the results.
function buildNextBest(cats){
  if(!cats.length) return '';
  const chips=cats.map(c=>(
    '<a class="nb-chip" href="'+esc(servicesHref(c.slug))+'" onclick="openServices(\''+c.slug+'\');return false;">'
    +'<span class="nb-ic">'+(CAT_ICONS[c.slug]||'•')+'</span>'
    +'<span class="nb-name">'+esc(c.label)+'</span></a>'
  )).join('');
  return '<div class="nb-wrap"><div class="nb-label">You might also be looking for</div>'
    +'<div class="nb-chips">'+chips+'</div></div>';
}

// Contact Us anchor — always closes out the panel as the safety net (replaces "Ask Gopher AI").
function buildContactUs(query, hadAnything, workerContext){
  // Worker/business questions: don't push a customer request (they have their
  // own flows). The FAQ answer above is the help they needed.
  if(workerContext) return '';
  return '<div class="cu-wrap"><div class="cu-head">Didn\'t find the right fit?</div>'
    +'<div class="cu-sub">It may be a unique request, but there\'s a strong chance we can find a neighbor to help — and if not, rest assured it won\'t cost you a dime!</div>'
    +'<a class="cu-btn" href="'+esc(GOPHER_LINKS.request)+'" onclick="submitRequest();return false;">Submit a request '+svgArrow()+'</a></div>';
}

function render(results, query, isComplete){
  current=results; activeIdx=-1;
  if(!query.trim()){ close(); return; }
  bar.classList.add('has-results');

  // Confidence-aware service match.
  const intentInfo = classifyWithConfidence(query);
  const allIntents = intentInfo ? classifyIntent(query) : [];
  const confidence = intentInfo ? intentInfo.confidence : null;
  // High confidence: card may carry its (rare) runner-up inline. Less confident:
  // show ONLY the top category on the card, and move everything else into NEXT-BEST.
  const cardIntents = (confidence==='high') ? allIntents : allIntents.slice(0,1);
  const card = buildServiceCard(cardIntents, query, confidence);
  const haveCard = !!card;

  // Cap FAQ matches at 4 "next best" — they already cleared the relevance floor.
  const faqs = results.slice(0,4);
  const haveFaqs = faqs.length>0;
  current = faqs;   // keyboard nav operates on what's shown

  // Related service categories ("next best"):
  //  - VERY confident -> none (keep the clean answer uncluttered)
  //  - LESS confident -> the runner-up(s) + any other related categories
  //  - no card but FAQs -> related service paths if any
  const shownSlugs = cardIntents.map(i=>i.slug);
  //  - VERY confident -> none (keep the clean answer uncluttered)
  //  - LESS confident -> the runner-up(s) + any other related categories
  //  - no card but FAQs -> related service paths if any
  let related = (confidence==='high') ? [] : relatedCategories(query, shownSlugs);
  // CROSS-CATEGORY AFFINITY: some terms route primarily to one category (e.g. a
  // sofa is MOVING, a fence is YARD) but per the Home/Office Services dataset are
  // also valid home/office work. For those terms we keep primary routing and
  // surface Home/Office Services as a "close match" chip — even on a clean
  // high-confidence card. General rule going forward: add overlap terms to
  // ALSO_HOME_SERVICES rather than moving vocabulary between categories.
  const affinity = crossAffinity(query, shownSlugs.concat(related.map(r=>r.slug)));
  if(affinity.length) related = related.concat(affinity).slice(0,4);

  // Is this query a real attempt? It must contain at least one CONTENT word —
  // something outside the filler lists. "can I", "do you", "i need" are all pure
  // filler (no content yet), so we stay quiet and wait instead of dumping the grid.
  const qWords = query.trim().toLowerCase().split(/\s+/).filter(Boolean);
  const hasContentWord = qWords.some(w => w.length>=3 && !STOP.has(w) && !LOWINFO.has(w));
  const substantial = hasContentWord && (query.trim().length>=4);
  const anything = haveCard || haveFaqs || related.length>0;

  // Nothing matched AND no real content word yet -> stay quiet (still mid-thought).
  if(!anything && !substantial){ close(); return; }

  // ---- ASSEMBLE in the required order ----
  // 1) Instant request path (service card) — only if applicable
  let html = card;

  // 2) FAQ matches (exact -> next best), capped at 4
  if(haveFaqs){
    html += '<div class="res-head"><span>'+faqs.length+' related answer'+(faqs.length>1?'s':'')
      +'</span><span class="ai-badge">'+svgSpark()+'Smart search</span></div>'
      + faqs.map((r,i)=>(
        '<a class="res" data-i="'+i+'" onclick="openAnswer('+i+');return false;">'
        +'<div class="res-q"><span class="res-tag '+r.rec.group+'">'+r.rec.group+'</span>'+hl(r.rec.q,query)+'</div>'
        +'<div class="res-a">'+hl(r.rec.a,query)+'</div></a>'
      )).join('');
  }

  // 2b) Next-best related service categories (chips)
  html += buildNextBest(related);

  // If we truly found nothing relevant, show the big category grid to help them choose.
  if(!anything && substantial){ html += buildFallback(query); }

  // 3) Contact Us — always anchors the bottom as the safety net.
  // Worker/business context: no service card AND the top FAQ answer is a
  // Workers/Businesses question (e.g. "why is my payout delayed", "how do I list
  // a deal"). In that case we don't push a customer "Submit a request" CTA. This
  // uses the same top-group signal as the answer panel for consistency.
  const topFaqGroup = haveFaqs ? faqs[0].rec.group : null;
  const workerContext = !haveCard && (topFaqGroup==='Workers' || topFaqGroup==='Businesses');
  html += buildContactUs(query, anything, workerContext);

  box.innerHTML = html;
  box.classList.add('open');
}
function close(){ box.classList.remove('open'); box.innerHTML=''; bar.classList.remove('has-results'); }

// Instant reaction: always search the EXACT current text in the bar — no pause,
// no dropping of partial words. The content-word guard (in scoreRec) is what keeps
// this safe from filler-word noise like "can"/"offer", so reacting live is fine.
// Common consumer-search typos. Explicit map for the high-value ones (reliable),
// plus light fuzzy correction handles the long tail elsewhere via the scorers.
const TYPO_MAP={
  to:'do', od:'do', doo:'do', dho:'do',          // "to you deliver" -> "do you deliver"
  teh:'the', hte:'the', adn:'and', nad:'and',
  yuo:'you', oyu:'you', youu:'you',
  wat:'what', wht:'what', waht:'what', wnat:'want', watn:'want',
  hwo:'how', cna:'can', acn:'can',
  delivary:'delivery', delvery:'delivery', deliever:'deliver',
  ride:'ride', rde:'ride', rdie:'ride',
  mover:'mover', moveing:'moving', haulin:'hauling',
  electritian:'electrician', electrican:'electrician', plummer:'plumber',
  cigaret:'cigarette', cigarets:'cigarettes', tabacco:'tobacco', tobaco:'tobacco',budwiser:'budweiser',michelobb:'michelob',corrona:'corona',modello:'modelo',hineken:'heineken',yuenglin:'yuengling',chardonay:'chardonnay',moscoto:'moscato',proseco:'prosecco',smirnof:'smirnoff',absoloute:'absolut',casamigo:'casamigos',jager:'jagermeister'};
function correctTypos(text){
  return text.split(/(\s+)/).map(tok=>{
    if(/^\s+$/.test(tok)||!tok) return tok;
    const low=tok.toLowerCase();
    return TYPO_MAP[low]!==undefined ? TYPO_MAP[low] : tok;
  }).join('');
}

function doSearch(){
  const raw=input.value.trim();
  // Typing supersedes any pending upload banner — clear it so the text search
  // takes over cleanly.
  if(_uploadBanner) _uploadBanner='';
  if(raw.length<2){ close(); return; }   // a single character isn't worth matching
  const q=correctTypos(raw);
  render(searchFaqs(q, scopeTag()), q, true);
}

};

   • "Submit a request" / fallback tiles  -> the request page
   • "See how it works"  -> the request page, Demo section
   • category chips ("you might also be looking for") -> the services

const GOPHER_LINKS = {
  request:     'gopher-request.html#login',    // Submit a request -> login / sign-up
  requestDemo: 'gopher-request.html#demo',     // See how it works -> Demo section
  services:    'gopher-services.html',         // category chips land here
  // per-category anchors on the services page — match these to the real section ids
  serviceSections: {
    junk_removal:'#junk-removal', delivery:'#delivery', moving:'#moving',
    ride_sharing:'#ride-sharing', yard_work_outdoor_projects:'#yard-outdoor',
    hourly_day_labor:'#day-labor', home_services:'#home-services', other:'#other'
  }
};
function requestHref(slug){
  if(!slug) return GOPHER_LINKS.request;
  // Insert ?category=... BEFORE any #hash, so e.g. gopher-request.html#login
  // becomes gopher-request.html?category=moving#login (query before fragment).
  const hashAt = GOPHER_LINKS.request.indexOf('#');
  const path = hashAt>=0 ? GOPHER_LINKS.request.slice(0,hashAt) : GOPHER_LINKS.request;
  const hash = hashAt>=0 ? GOPHER_LINKS.request.slice(hashAt) : '';
  const sep  = path.indexOf('?')>=0 ? '&' : '?';
  return path + sep + 'category=' + encodeURIComponent(slug) + hash;
}
function servicesHref(slug){ return GOPHER_LINKS.services + (GOPHER_LINKS.serviceSections[slug]||''); }
function _go(url){
  // On a normal hosted page this navigates directly. Inside a sandboxed or
  // embedded preview the same-frame nav can be blocked, so we try the top
  // frame, then fall back to a new tab, before giving up quietly.
  try {
    if (window.top && window.top !== window.self) {
      try { window.top.location.href = url; return; } catch(_) {}
    }
    window.location.assign(url);
  } catch(e) {
    try { window.open(url, '_blank', 'noopener'); }
    catch(_) { console.log('[Gopher iQ] navigation blocked ->', url); }
  }
}
// Submit a request: if the sign-in/sign-up portal exists on THIS page (we're on gopher-request.html) open it immediately — no reload; else go to the request page #login, which opens it on arrival. Category stashed for a post-sign-in seeding hook.
window.submitRequest=function(slug){ if(slug){try{window.__aiBookedCategory=slug;}catch(_e){}} if(typeof window.openPortal==='function'){window.openPortal();return;} _go(requestHref(slug)); };
// See how it works -> request page, Demo section.
window.seeHowItWorks=function(){ _go(GOPHER_LINKS.requestDemo); };
// "You might also be looking for" -> services page, relevant section.
window.openServices=function(slug){ _go(servicesHref(slug)); };

window.bookService=function(slug,label){ window.submitRequest(slug); };

   UPLOAD ANALYSIS — "+" accepts photos / PDFs / documents
   ----------------------------------------------------------------
   The "+" icon opens a file picker (wired in boot). When a file is

   Whatever it returns is fed into the SAME render() pipeline as a

// Status banner shown above the results while analysis runs (and the result note after).
function buildUploadStatus(state, info){
  // state: 'analyzing' | 'stub' | 'matched' | 'unclear' | 'error'
  const filename = (info && info.filename) || 'your file';
  const safe = esc(filename);
  if(state==='analyzing'){
    return '<div class="up-status up-analyzing">'
      +'<span class="up-spin"></span>'
      +'<span>Reading <strong>'+safe+'</strong> to see if we can help identify a service…</span>'
      +'<button class="up-cancel" onclick="cancelUpload();return false;" aria-label="Cancel">×</button></div>';
  }
  if(state==='stub'){
    return '<div class="up-status up-note">'
      +'<strong>Upload received:</strong> '+safe+'. '
      +'<em>Auto-analysis isn\'t wired in this build yet — pick a category below or describe what you need.</em>'
      +'<button class="up-cancel" onclick="cancelUpload();return false;" aria-label="Dismiss">×</button></div>';
  }
  if(state==='matched'){
    return '<div class="up-status up-ok"><strong>From your upload:</strong> '+safe
      +' looks like <strong>'+esc(info.label)+'</strong>.'
      +'<button class="up-cancel" onclick="cancelUpload();return false;" aria-label="Dismiss">×</button></div>';
  }
  if(state==='unclear'){
    return '<div class="up-status up-note"><strong>From your upload:</strong> '+safe
      +' — closest match below, but we\'re not sure.'
      +'<button class="up-cancel" onclick="cancelUpload();return false;" aria-label="Dismiss">×</button></div>';
  }
  return '<div class="up-status up-err">We couldn\'t read <strong>'+safe+'</strong>. Try describing it instead.'
    +'<button class="up-cancel" onclick="cancelUpload();return false;" aria-label="Dismiss">×</button></div>';
}

let _uploadBanner = '';   // current banner HTML, prepended to render output

window.cancelUpload=function(){
  _uploadBanner='';
  doSearch();
};

window.handleUpload=async function(file){
  if(!file) return;
  const info={ filename: file.name || 'upload' };

  // 1) Show "analyzing" banner. We bypass the normal text-query render path
  //    and put the banner directly into the results box.
  _uploadBanner = buildUploadStatus('analyzing', info);
  bar.classList.add('has-results');
  box.innerHTML = _uploadBanner;
  box.classList.add('open');

  // 2) Call the (currently stub) analyzer.
  let result;
  try { result = await analyzeUpload(file); }
  catch(err){ console.error('[Gopher AI] analyzeUpload failed:', err); result=null; }

  // 3) If the analyzer isn't wired yet, show the "not connected" note + fallback.
  if(!result || result._stub){
    _uploadBanner = buildUploadStatus('stub', info);
    // Reuse the fallback grid + Contact Us so the user has next steps.
    box.innerHTML = _uploadBanner + buildFallback('') + buildContactUs('', false);
    return;
  }

  // 4) Route the analyzer's verdict through the SAME confidence-aware UI
  //    we use for text queries.
  if(result.confidence==='high' && result.slug){
    _uploadBanner = buildUploadStatus('matched', { filename: info.filename, label: result.label });
    const intent = { slug: result.slug, label: result.label,
      blurb: (CATEGORIES.find(c=>c.slug===result.slug)||{}).blurb || ('Yes — a Gopher can help with '+result.label+'.') };
    box.innerHTML = _uploadBanner + buildServiceCard([intent], '', 'high') + buildContactUs('', true);
    return;
  }
  if(result.confidence==='less' && result.slug){
    _uploadBanner = buildUploadStatus('unclear', { filename: info.filename });
    const intent = { slug: result.slug, label: result.label,
      blurb: (CATEGORIES.find(c=>c.slug===result.slug)||{}).blurb || ('Closest match — '+result.label+'.') };
    const alts = (result.alternatives||[]).map(a=>({
      slug:a.slug, label:a.label,
      blurb:(CATEGORIES.find(c=>c.slug===a.slug)||{}).blurb||''
    }));
    box.innerHTML = _uploadBanner + buildServiceCard([intent], '', 'less')
      + buildNextBest(alts) + buildContactUs('', true);
    return;
  }
  // 'none' — couldn't classify. Show fallback grid so the user can self-pick.
  _uploadBanner = buildUploadStatus('error', info);
  box.innerHTML = _uploadBanner + buildFallback('') + buildContactUs('', false);
};

input.addEventListener('input', doSearch);   // instant: react to exact current text

input.addEventListener('keydown',e=>{
  const items=[...box.querySelectorAll('.res')];
  if(e.key==='ArrowDown'){e.preventDefault(); activeIdx=Math.min(activeIdx+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault(); activeIdx=Math.max(activeIdx-1,0);}
  else if(e.key==='Enter'){
    e.preventDefault();
    if(current[activeIdx]) openAnswer(activeIdx);
    else if(current.length) openAnswer(0);
    else doSearch();
    return;

  else if(e.key==='Escape'){ close(); return; }
  else return;
  items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));
  if(items[activeIdx]) items[activeIdx].scrollIntoView({block:'nearest'});
});
