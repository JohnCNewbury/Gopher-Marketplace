<style id="gopher-ai-engine-css-inline">
/* ================================================================
   gopher-ai-engine.css — styles for the Gopher AI Pill engine
   ----------------------------------------------------------------
   Pair with gopher-ai-engine.js. Link both into any page that has
   the .ai-bar markup, and the pill becomes live.

   This stylesheet styles ONLY elements the engine adds (results
   dropdown, service card, fallback, contact-us, upload banner,
   scope menu, answer panel). It does NOT restyle the .ai-bar pill
   itself — the host page keeps its existing pill design.
   ================================================================ */

.ai-scope-wrap { flex:0 0 auto; position:relative; }
.ai-scope .chev { transition:transform 0.2s ease; }
.ai-scope.open .chev { transform:rotate(180deg); }
.scope-menu {
    position:absolute; top:calc(100% + 8px); right:0;
    background:#fff; border-radius:14px; padding:6px;
    min-width:172px; z-index:40;
    box-shadow:0 18px 44px -10px rgba(0,36,97,0.30), 0 0 0 1px rgba(0,36,97,0.06);
    opacity:0; visibility:hidden; transform:translateY(-6px);
    transition:opacity 0.16s ease, transform 0.16s ease, visibility 0.16s;
  }
.scope-menu.open { opacity:1; visibility:visible; transform:translateY(0); }
.scope-opt {
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    width:100%; text-align:left; cursor:pointer;
    padding:10px 12px; border:none; background:transparent; border-radius:9px;
    font-family:'Nunito',sans-serif; font-weight:700; font-size:14px; color:var(--navy);
    transition:background 0.12s, color 0.12s;
  }
.scope-opt:hover { background:#f3f7ff; color:var(--green-dark,#27b85e); }
.scope-opt.sel { background:var(--green-light,#e4f9ed); color:var(--green-dark,#27b85e); }
.scope-opt .label-wrap { display:flex; flex-direction:column; gap:1px; }
.scope-opt .sub {
    font-family:'DM Sans',sans-serif; font-weight:500; font-size:11px; color:#8a93a6;
  }
.scope-opt:hover .sub, .scope-opt.sel .sub { color:#5fa97a; }
.scope-opt .check { width:16px; height:16px; flex:0 0 auto; opacity:0; color:var(--green-dark,#27b85e); }
.scope-opt.sel .check { opacity:1; }
.ai-wrap { max-width:600px; margin:0 auto; position:relative; }
.ai-results {
    position:absolute; top:calc(100% + 10px); left:0; right:0;
    background:#fff; border-radius:20px;
    box-shadow:0 28px 60px -18px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,36,97,0.06);
    overflow:hidden; display:none; z-index:25; text-align:left;
    max-height:62vh; overflow-y:auto;
  }
.ai-results.open { display:block; animation:pop 0.18s ease; }
@keyframes pop { from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:none;} }
.res-head {
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 18px; background:#fafbfc; border-bottom:1px solid #eef0f4;
    font-family:'Nunito',sans-serif; font-weight:800; font-size:11.5px;
    letter-spacing:0.08em; text-transform:uppercase; color:var(--muted);
  }
.res-head .ai-badge {
    display:inline-flex; align-items:center; gap:5px; color:var(--green-dark,#27b85e);
  }
.res-head .ai-badge svg { width:13px; height:13px; }
.svc-card {
    background:linear-gradient(135deg,#eafaf0 0%, #e3f6ee 100%);
    border-bottom:1px solid #d4eede; padding:16px 18px;
  }
.svc-card.tentative {
    background:linear-gradient(135deg,#f4f7fb 0%, #eef2f7 100%);
    border-bottom:1px solid #e2e8f0;
  }
.svc-card.tentative .svc-icon { background:#9fb3c8; box-shadow:none; }
.svc-hint {
    font-family:'Nunito',sans-serif; font-weight:700; font-size:11px; letter-spacing:.04em;
    text-transform:uppercase; color:#7a8aa0; margin-bottom:6px;
  }
.svc-top { display:flex; align-items:flex-start; gap:12px; }
.svc-icon {
    flex:0 0 auto; width:38px; height:38px; border-radius:11px;
    background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 14px -4px rgba(51,217,117,0.7);
  }
.svc-icon svg { width:20px; height:20px; }
.svc-body { flex:1; min-width:0; }
.svc-cat {
    font-family:'Nunito',sans-serif; font-weight:900; font-size:11px; letter-spacing:0.06em;
    text-transform:uppercase; color:var(--green-dark,#27b85e); margin-bottom:2px;
  }
.svc-blurb { font-size:14px; line-height:1.5; color:var(--text); }
.svc-actions { display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-top:12px; }
.svc-btn {
    display:inline-flex; align-items:center; justify-content:center; gap:7px; cursor:pointer;
    box-sizing:border-box; line-height:1;
    background:var(--navy); color:#fff; text-decoration:none;
    font-family:'Nunito',sans-serif; font-weight:800; font-size:13.5px;
    padding:10px 18px; border-radius:999px; border:1.5px solid transparent;
    transition:background 0.18s, transform 0.18s;
  }
.svc-btn:hover { background:var(--green-dark,#27b85e); transform:translateY(-1px); }
.svc-btn svg { width:15px; height:15px; }
.svc-demo {
    display:inline-flex; align-items:center; justify-content:center; gap:7px; cursor:pointer;
    box-sizing:border-box; line-height:1;
    background:#fff; color:var(--navy); text-decoration:none;
    font-family:'Nunito',sans-serif; font-weight:800; font-size:13.5px;
    padding:10px 18px; border-radius:999px; border:1.5px solid var(--navy-light,#bcc9e2);
    transition:background 0.18s, border-color 0.18s, transform 0.18s;
  }
.svc-demo:hover { background:var(--navy-light,#bcc9e2); transform:translateY(-1px); }
.ap-actions { display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-top:18px; }
.ap-actions .ap-close { margin-top:0; margin-left:auto; }
.svc-or { font-size:12.5px; color:#5a8a6e; font-family:'Nunito',sans-serif; font-weight:700; }
.svc-chip {
    display:inline-flex; align-items:center; gap:5px; cursor:pointer;
    background:#fff; color:var(--green-dark,#27b85e); border:1px solid #c5e8d4;
    font-family:'Nunito',sans-serif; font-weight:700; font-size:12.5px;
    padding:6px 12px; border-radius:999px; text-decoration:none;
    transition:background 0.15s, border-color 0.15s;
  }
.svc-chip:hover { background:var(--green-light,#e4f9ed); border-color:var(--green); }
.fb-card { padding:16px 18px 18px; border-bottom:1px solid #eef0f4; }
.fb-head {
    font-family:'Nunito',sans-serif; font-weight:800; font-size:14.5px; color:var(--navy);
    margin-bottom:3px;
  }
.fb-sub { font-size:13px; color:var(--muted); margin-bottom:13px; }
.fb-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:8px;
  }
@media (max-width:520px) { .fb-grid { grid-template-columns:1fr; } }
.fb-cat {
    display:flex; align-items:center; gap:9px; cursor:pointer; text-align:left;
    background:#f7f9fc; border:1px solid #e9edf4; border-radius:11px;
    padding:10px 12px; text-decoration:none; transition:background 0.14s, border-color 0.14s, transform 0.14s;
  }
.fb-cat:hover { background:var(--green-light,#e4f9ed); border-color:var(--green); transform:translateY(-1px); }
.fb-cat .fb-ic {
    flex:0 0 auto; width:30px; height:30px; border-radius:8px;
    background:#fff; border:1px solid #e3e8f0; display:flex; align-items:center; justify-content:center;
    font-size:16px; line-height:1;
  }
.fb-cat .fb-name {
    font-family:'Nunito',sans-serif; font-weight:700; font-size:13.5px; color:var(--navy); line-height:1.2;
  }
.fb-support {
    margin-top:14px; padding-top:14px; border-top:1px dashed #e2e7ef;
    font-size:13.5px; color:var(--text); display:flex; align-items:center; gap:9px; flex-wrap:wrap;
  }
.fb-support .fb-q { flex:0 0 auto; }
.fb-support a {
    color:var(--green-dark,#27b85e); font-family:'Nunito',sans-serif; font-weight:800; text-decoration:none;
    border-bottom:2px solid transparent; transition:border-color 0.15s;
  }
.fb-support a:hover { border-color:var(--green); }
.nb-wrap { padding:12px 18px 14px; border-bottom:1px solid #eef0f4; }
.nb-label {
    font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; letter-spacing:.06em;
    text-transform:uppercase; color:var(--muted); margin-bottom:9px;
  }
.nb-chips { display:flex; flex-wrap:wrap; gap:8px; }
.nb-chip {
    display:inline-flex; align-items:center; gap:7px; cursor:pointer; text-decoration:none;
    background:#f7f9fc; border:1px solid #e9edf4; border-radius:999px;
    padding:7px 13px; transition:background .14s, border-color .14s, transform .14s;
  }
.nb-chip:hover { background:var(--green-light,#e4f9ed); border-color:var(--green); transform:translateY(-1px); }
.nb-chip .nb-ic { font-size:14px; line-height:1; }
.nb-chip .nb-name { font-family:'Nunito',sans-serif; font-weight:700; font-size:13px; color:var(--navy); }
.cu-wrap { padding:16px 18px 18px; text-align:center; }
.cu-head {
    font-family:'Nunito',sans-serif; font-weight:800; font-size:14px; color:var(--navy); margin-bottom:3px;
  }
.cu-sub { font-size:13px; color:var(--muted); margin-bottom:13px; }
.cu-btn {
    display:inline-flex; align-items:center; gap:8px; cursor:pointer; text-decoration:none;
    background:var(--navy); color:#fff;
    font-family:'Nunito',sans-serif; font-weight:800; font-size:13.5px;
    padding:11px 22px; border-radius:999px; border:none;
    transition:background .18s, transform .18s;
  }
.cu-btn:hover { background:var(--green-dark,#27b85e); transform:translateY(-1px); }
.cu-btn svg { width:15px; height:15px; }

/* ── UPLOAD status banner (shown above results when a file is uploaded) ── */
.up-status {
  display:flex; align-items:center; gap:10px;
  padding:11px 16px;
  font-family:'DM Sans',sans-serif; font-size:13.5px; line-height:1.45;
  border-bottom:1px solid #eef0f4;
}
.up-status strong { font-family:'Nunito',sans-serif; font-weight:800; }
.up-status em { font-style:italic; color:#6b7280; }
.up-status > span:nth-child(2) { flex:1; min-width:0; }
.up-analyzing { background:#eef4ff; color:#1f3b7a; }
.up-note      { background:#fff7e6; color:#7a4a00; }
.up-ok        { background:#eafaf0; color:#1d6a3f; }
.up-err       { background:#fdecec; color:#8a2a2a; }
.up-cancel {
  flex:0 0 auto; width:22px; height:22px; border-radius:50%;
  border:none; background:rgba(0,0,0,0.06); color:inherit;
  font-size:15px; line-height:1; cursor:pointer; padding:0;
}
.up-cancel:hover { background:rgba(0,0,0,0.12); }
.up-spin {
  flex:0 0 auto; width:14px; height:14px; border-radius:50%;
  border:2px solid rgba(31,59,122,0.25); border-top-color:#1f3b7a;
  animation: up-spin 0.7s linear infinite;
}
@keyframes up-spin { to { transform: rotate(360deg); } }

.res {
    display:block; padding:14px 18px; cursor:pointer;
    border-bottom:1px solid #f4f5f8; text-decoration:none; color:var(--text);
    transition:background 0.12s;
  }
.res:last-child { border-bottom:none; }
.res.active, .res:hover { background:var(--green-light,#e4f9ed); }
.res-q {
    font-family:'Nunito',sans-serif; font-weight:800; font-size:15px; color:var(--navy);
    display:flex; align-items:center; gap:8px; line-height:1.35;
  }
.res-tag {
    flex:0 0 auto; font-family:'Nunito',sans-serif; font-weight:700; font-size:10px;
    letter-spacing:0.04em; text-transform:uppercase;
    padding:2px 8px; border-radius:999px;
  }
.res-tag.Customers { background:#e7f0ff; color:#2256b5; }
.res-tag.Workers { background:var(--green-light,#e4f9ed); color:var(--green-dark,#27b85e); }
.res-tag.Businesses { background:#ede7ff; color:#5b3fb5; }
.res-tag.Support { background:#fff0e0; color:#b5651d; }
.answer-panel .ap-tag.Support { background:#fff0e0; color:#b5651d; }
.res-a {
    font-size:13px; color:var(--muted); margin-top:5px; line-height:1.55;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
.res mark { background:#fff2a8; color:inherit; border-radius:3px; padding:0 2px; }
.res-empty { padding:26px 18px; text-align:center; color:var(--muted); font-size:14px; }
.res-empty strong { color:var(--navy); }
.res-empty .ask-ai {
    display:inline-block; margin-top:14px; background:var(--navy); color:#fff;
    font-family:'Nunito',sans-serif; font-weight:700; font-size:13.5px;
    padding:10px 20px; border-radius:999px; cursor:pointer; border:none;
    transition:background 0.18s;
  }
.res-empty .ask-ai:hover { background:var(--green-dark,#27b85e); }
.answer-panel {
    max-width:600px; margin:18px auto 0; background:#fff; border-radius:18px;
    padding:24px 26px; box-shadow:0 18px 44px -16px rgba(0,0,0,0.3);
    display:none; text-align:left; animation:pop 0.2s ease;
  }
.answer-panel.open { display:block; }
.answer-panel .ap-tag { font-family:'Nunito',sans-serif; font-weight:700; font-size:10px; letter-spacing:.05em; text-transform:uppercase; padding:3px 9px; border-radius:999px; }
.answer-panel .ap-tag.Customers { background:#e7f0ff; color:#2256b5; }
.answer-panel .ap-tag.Workers { background:var(--green-light,#e4f9ed); color:var(--green-dark,#27b85e); }
.answer-panel .ap-tag.Businesses { background:#ede7ff; color:#5b3fb5; }
.answer-panel h3 { font-family:'Nunito',sans-serif; font-weight:900; font-size:19px; color:var(--navy); margin:12px 0 12px; line-height:1.3; }
.answer-panel p { font-size:15px; line-height:1.7; color:var(--text); }
.answer-panel .ap-close {
    display:inline-flex; align-items:center; justify-content:center;
    box-sizing:border-box; line-height:1; appearance:none; -webkit-appearance:none;
    background:none; border:1.5px solid var(--navy-light,#bcc9e2); color:var(--navy);
    font-family:'Nunito',sans-serif; font-weight:800; font-size:13.5px;
    padding:10px 18px; border-radius:999px; cursor:pointer;
  }
.answer-panel .ap-close:hover { background:var(--navy-light,#bcc9e2); }
</style>
